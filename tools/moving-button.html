<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moving Button — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:2rem 4rem 4rem;max-width:700px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center}
    h1{font-family:'DM Serif Display',serif;font-size:2.5rem;letter-spacing:-.025em;margin-bottom:.25rem;text-align:center}
    .hud{display:flex;gap:2rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
    .hud-item{text-align:center}
    .hud-val{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-.02em}
    .hud-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    /* Arena */
    .arena{width:100%;max-width:600px;height:380px;background:var(--card);border:1px solid var(--border);border-radius:14px;position:relative;overflow:hidden;margin-bottom:1rem;cursor:crosshair}
    .arena-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--muted);font-size:.95rem;pointer-events:none}
    .moving-btn{position:absolute;background:var(--ink);color:#fff;border:none;border-radius:99px;padding:.6rem 1.4rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:none;user-select:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
    .moving-btn:hover{opacity:.9}
    /* Shrinking timer bar */
    .timer-bar{width:100%;max-width:600px;height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1rem}
    .timer-fill{height:100%;background:var(--ink);border-radius:99px;transition:width .1s linear}
    /* Mode row */
    .diff-row{display:flex;gap:.4rem;justify-content:center;margin-bottom:.75rem}
    .diff-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:99px;padding:.3rem .85rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .diff-btn:hover{border-color:var(--ink);color:var(--ink)}
    .diff-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .start-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.85rem 2.5rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s;margin-bottom:.5rem}
    .start-btn:hover{opacity:.8}
    .state-msg{font-size:.9rem;color:var(--muted);text-align:center;min-height:1.4rem}
    /* Misclick flash */
    .arena.miss{animation:miss .2s ease}
    @keyframes miss{0%{background:#fdf0f0}100%{background:var(--card)}}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}h1{font-size:2rem}.arena{height:280px}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <h1>Moving Button 🎯</h1>
  <div class="hud">
    <div class="hud-item"><div class="hud-val" id="score">0</div><div class="hud-label">Score</div></div>
    <div class="hud-item"><div class="hud-val" id="misses">0</div><div class="hud-label">Misses</div></div>
    <div class="hud-item"><div class="hud-val" id="timer">30</div><div class="hud-label">Seconds</div></div>
    <div class="hud-item"><div class="hud-val" id="best">0</div><div class="hud-label">Best</div></div>
  </div>

  <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>

  <div class="arena" id="arena">
    <div class="arena-msg" id="arenaMsg">
      <span style="font-size:2rem">🎯</span>
      <span>Click the button as many times as you can!</span>
    </div>
    <button class="moving-btn" id="movingBtn" style="display:none" onclick="hit()">Click me!</button>
  </div>

  <div class="diff-row">
    <button class="diff-btn" data-d="slow">Slow</button>
    <button class="diff-btn active" data-d="normal">Normal</button>
    <button class="diff-btn" data-d="fast">Fast</button>
    <button class="diff-btn" data-d="chaos">Chaos</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()">▶ Start</button>
  <div class="state-msg" id="stateMsg">Click Start to begin</div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  const DIFFS={slow:{speed:1.5,size:80},normal:{speed:2.8,size:70},fast:{speed:5,size:55},chaos:{speed:9,size:44}};
  let score=0,misses=0,timeLeft=30,best=parseInt(localStorage.getItem('mb-best')||'0'),diff='normal';
  let running=false,gameTimer=null,animFrame=null;
  let bx=100,by=100,vx=2,vy=2;
  let btnW=80,btnH=36;
  document.getElementById('best').textContent=best;

  document.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-d]').forEach(x=>x.classList.remove('active'));b.classList.add('active');diff=b.dataset.d;}));

  const arena=document.getElementById('arena');
  const btn=document.getElementById('movingBtn');

  arena.addEventListener('click',e=>{
    if(!running)return;
    if(e.target===btn)return; // handled by btn click
    misses++;document.getElementById('misses').textContent=misses;
    arena.classList.remove('miss');void arena.offsetWidth;arena.classList.add('miss');
  });

  function hit(){
    if(!running)return;
    score++;document.getElementById('score').textContent=score;
    move(); // jump to new position on hit
  }

  function move(){
    const cfg=DIFFS[diff];
    const aW=arena.clientWidth,aH=arena.clientHeight;
    // Random jump
    bx=Math.random()*(aW-btnW);
    by=Math.random()*(aH-btnH);
    btn.style.left=bx+'px';btn.style.top=by+'px';
  }

  function animate(){
    if(!running)return;
    const cfg=DIFFS[diff];
    const aW=arena.clientWidth,aH=arena.clientHeight;
    bx+=vx*cfg.speed;by+=vy*cfg.speed;
    if(bx<0){bx=0;vx=Math.abs(vx)*(diff==='chaos'?-1*(Math.random()*2+.5):1);if(diff==='chaos')vy+=(Math.random()-.5);}
    if(bx>aW-btnW){bx=aW-btnW;vx=-Math.abs(vx)*(diff==='chaos'?Math.random()*2+.5:1);if(diff==='chaos')vy+=(Math.random()-.5);}
    if(by<0){by=0;vy=Math.abs(vy);}
    if(by>aH-btnH){by=aH-btnH;vy=-Math.abs(vy);}
    if(diff==='chaos'){vx=Math.max(-3,Math.min(3,vx));vy=Math.max(-3,Math.min(3,vy));}
    btn.style.left=bx+'px';btn.style.top=by+'px';
    animFrame=requestAnimationFrame(animate);
  }

  function startGame(){
    cancelAnimationFrame(animFrame);clearInterval(gameTimer);
    score=0;misses=0;timeLeft=30;running=true;
    document.getElementById('score').textContent=0;document.getElementById('misses').textContent=0;document.getElementById('timer').textContent=30;
    document.getElementById('timerFill').style.width='100%';
    document.getElementById('arenaMsg').style.display='none';
    document.getElementById('stateMsg').textContent='';
    document.getElementById('startBtn').textContent='Restart';
    btn.style.display='block';
    const cfg=DIFFS[diff];
    btnW=cfg.size*2;btnH=cfg.size*0.9;
    btn.style.width=btnW+'px';
    vx=(Math.random()>.5?1:-1);vy=(Math.random()>.5?1:-1);
    bx=arena.clientWidth/2-btnW/2;by=arena.clientHeight/2-btnH/2;
    animate();
    const total=30;
    gameTimer=setInterval(()=>{
      timeLeft--;document.getElementById('timer').textContent=timeLeft;
      document.getElementById('timerFill').style.width=(timeLeft/total*100)+'%';
      if(timeLeft<=0){
        clearInterval(gameTimer);cancelAnimationFrame(animFrame);running=false;
        btn.style.display='none';document.getElementById('arenaMsg').style.display='flex';
        if(score>best){best=score;localStorage.setItem('mb-best',best);document.getElementById('best').textContent=best;}
        document.getElementById('stateMsg').textContent=`Game over! Score: ${score}, Misses: ${misses}${score===best?' 🏆 New best!':''}`;
        document.getElementById('startBtn').textContent='▶ Play Again';
      }
    },1000);
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
