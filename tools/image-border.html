<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Border — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:860px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .dropzone{border:1.5px dashed var(--border);border-radius:12px;padding:3rem 2rem;text-align:center;background:var(--card);cursor:pointer;transition:border-color .2s,background .2s;position:relative}
    .dropzone:hover,.dropzone.drag-over{border-color:var(--ink);background:#faf9f5}
    .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:2.2rem;display:block;margin-bottom:.75rem}
    .drop-title{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:.3rem}
    .drop-sub{font-size:.85rem;color:var(--muted)}
    .panel{display:none;margin-top:1.5rem}
    .panel.visible{display:block}
    .layout{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start}
    .preview-box{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .preview-label{padding:.6rem 1rem;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
    .preview-img-wrap{display:flex;align-items:center;justify-content:center;padding:1.2rem;min-height:260px;background:repeating-conic-gradient(#ddd 0% 25%,#f0f0f0 0% 50%) 0 0/16px 16px}
    #preview{max-width:100%;max-height:300px;object-fit:contain;display:block}
    .controls-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    .slider-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
    .slider-row label{font-size:.82rem;color:var(--muted);min-width:90px}
    input[type="range"]{flex:1;accent-color:var(--ink)}
    .slider-val{font-weight:500;min-width:36px;text-align:right;font-size:.85rem}
    .color-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
    .color-row label{font-size:.82rem;color:var(--muted);min-width:90px}
    .color-swatch{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
    .color-swatch input{position:absolute;inset:-6px;width:calc(100%+12px);height:calc(100%+12px);opacity:0;cursor:pointer}
    .color-hex{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;font-family:'DM Sans',monospace;font-size:.88rem;color:var(--ink);outline:none}
    .color-hex:focus{border-color:var(--ink)}
    .style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.5rem}
    .style-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:.5rem;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
    .style-btn:hover{border-color:var(--ink);color:var(--ink)}
    .style-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .preset-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
    .preset-btn{background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:.3rem .75rem;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .15s}
    .preset-btn:hover{border-color:var(--ink);color:var(--ink)}
    .action-row{display:flex;gap:.75rem;margin-top:.5rem}
    .btn{flex:1;padding:.85rem;border-radius:8px;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:all .2s;border:none;text-align:center}
    .btn-primary{background:var(--ink);color:#fff}
    .btn-primary:hover{opacity:.8}
    .btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
    .btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:760px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🖼️ Image</p>
  <h1>Image Border</h1>
  <p class="subtitle">Add a custom border around any image — choose size, colour, style, and corner radius. Download instantly.</p>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*" />
    <span class="drop-icon">📂</span>
    <p class="drop-title">Drop an image here</p>
    <p class="drop-sub">or click to browse</p>
  </div>

  <div class="panel" id="panel">
    <div class="layout">
      <div class="preview-box">
        <div class="preview-label">Preview</div>
        <div class="preview-img-wrap"><img id="preview" src="" alt="Preview" /></div>
      </div>

      <div>
        <div class="controls-card">
          <p class="card-title">Border size</p>
          <div class="slider-row">
            <label>Thickness</label>
            <input type="range" id="size" min="0" max="150" value="20" oninput="onSlider('size','sizeVal',this.value,'px');process()" />
            <span class="slider-val" id="sizeVal">20px</span>
          </div>
          <div class="slider-row">
            <label>Radius</label>
            <input type="range" id="radius" min="0" max="100" value="0" oninput="onSlider('radius','radiusVal',this.value,'px');process()" />
            <span class="slider-val" id="radiusVal">0px</span>
          </div>
          <p class="card-title" style="margin-top:1rem">Border colour</p>
          <div class="color-row">
            <label>Colour</label>
            <div class="color-swatch" id="swatch"><input type="color" id="colorPicker" value="#000000" oninput="syncColor(this.value)" /></div>
            <input type="text" class="color-hex" id="colorHex" value="#000000" oninput="syncHex(this.value)" maxlength="7" />
          </div>
          <p class="card-title" style="margin-top:1rem">Presets</p>
          <div class="preset-row">
            <button class="preset-btn" onclick="applyPreset('#ffffff',20,0)">White</button>
            <button class="preset-btn" onclick="applyPreset('#000000',20,0)">Black</button>
            <button class="preset-btn" onclick="applyPreset('#ffffff',40,12)">Polaroid</button>
            <button class="preset-btn" onclick="applyPreset('#c8a96e',8,0)">Gold</button>
            <button class="preset-btn" onclick="applyPreset('#f7f6f2',30,0)">Matte</button>
          </div>
        </div>

        <div class="action-row">
          <button class="btn btn-primary" onclick="download()">⬇ Download</button>
          <button class="btn btn-secondary" onclick="resetAll()">↩ New image</button>
        </div>
      </div>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<canvas id="canvas" style="display:none"></canvas>
<script>
  let srcImg = new Image();
  let fileName = 'bordered';
  let borderColor = '#000000';
  let debounceTimer;

  const dropzone = document.getElementById('dropzone');
  document.getElementById('fileInput').addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) loadFile(f); });

  function loadFile(file) {
    fileName = file.name.replace(/\.[^.]+$/,'');
    const url = URL.createObjectURL(file);
    srcImg.onload = () => {
      dropzone.style.display = 'none';
      document.getElementById('panel').classList.add('visible');
      process();
    };
    srcImg.src = url;
  }

  function onSlider(id, valId, val, unit) {
    document.getElementById(valId).textContent = val + unit;
  }

  function syncColor(hex) {
    borderColor = hex;
    document.getElementById('swatch').style.background = hex;
    document.getElementById('colorHex').value = hex;
    process();
  }

  function syncHex(val) {
    if (/^#[0-9a-fA-F]{6}$/.test(val)) {
      borderColor = val;
      document.getElementById('colorPicker').value = val;
      document.getElementById('swatch').style.background = val;
      process();
    }
  }

  function applyPreset(color, size, radius) {
    borderColor = color;
    document.getElementById('colorPicker').value = color;
    document.getElementById('colorHex').value = color;
    document.getElementById('swatch').style.background = color;
    document.getElementById('size').value = size;
    document.getElementById('sizeVal').textContent = size + 'px';
    document.getElementById('radius').value = radius;
    document.getElementById('radiusVal').textContent = radius + 'px';
    process();
  }

  function process() {
    const s      = parseInt(document.getElementById('size').value);
    const radius = parseInt(document.getElementById('radius').value);
    const canvas = document.getElementById('canvas');
    canvas.width  = srcImg.naturalWidth  + s * 2;
    canvas.height = srcImg.naturalHeight + s * 2;
    const ctx = canvas.getContext('2d');

    // Background fill (the border colour)
    ctx.fillStyle = borderColor;
    if (radius > 0) {
      const r = Math.min(radius, canvas.width/2, canvas.height/2);
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(canvas.width - r, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
      ctx.lineTo(canvas.width, canvas.height - r);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
      ctx.lineTo(r, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
      // Clip image to inner rounded rect
      ctx.save();
      const ir = Math.max(0, radius - s);
      ctx.beginPath();
      ctx.moveTo(s + ir, s);
      ctx.lineTo(canvas.width - s - ir, s);
      ctx.quadraticCurveTo(canvas.width - s, s, canvas.width - s, s + ir);
      ctx.lineTo(canvas.width - s, canvas.height - s - ir);
      ctx.quadraticCurveTo(canvas.width - s, canvas.height - s, canvas.width - s - ir, canvas.height - s);
      ctx.lineTo(s + ir, canvas.height - s);
      ctx.quadraticCurveTo(s, canvas.height - s, s, canvas.height - s - ir);
      ctx.lineTo(s, s + ir);
      ctx.quadraticCurveTo(s, s, s + ir, s);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(srcImg, s, s);
      ctx.restore();
    } else {
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(srcImg, s, s);
    }

    document.getElementById('preview').src = canvas.toDataURL('image/png');
  }

  function download() {
    const a = document.createElement('a');
    a.download = fileName + '-bordered.png';
    a.href = document.getElementById('canvas').toDataURL('image/png');
    a.click();
  }

  function resetAll() {
    dropzone.style.display = '';
    document.getElementById('panel').classList.remove('visible');
    document.getElementById('fileInput').value = '';
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
