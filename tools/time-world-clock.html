<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time & World Clock — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:860px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
    .mode-tab{background:var(--card);padding:.9rem;text-align:center;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;color:var(--muted);transition:background .15s}
    .mode-tab.active{background:var(--ink);color:#fff}
    .section{display:none}.section.visible{display:block}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
    /* Time diff */
    .diff-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:.75rem;align-items:end;margin-bottom:1rem}
    .field{display:flex;flex-direction:column;gap:.4rem}
    .field label{font-size:.82rem;color:var(--muted)}
    input[type="datetime-local"],select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--ink)}
    .swap-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .swap-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
    .result-box{background:var(--ink);color:#fff;border-radius:10px;padding:1.8rem;text-align:center;margin-bottom:1rem}
    .diff-big{font-family:'DM Serif Display',serif;font-size:3.5rem;letter-spacing:-.03em;line-height:1}
    .diff-label{font-size:.82rem;color:rgba(255,255,255,.55);margin-top:.4rem;letter-spacing:.08em;text-transform:uppercase}
    .diff-breakdown{display:flex;gap:1.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
    .diff-unit{text-align:center}
    .diff-unit-val{font-size:1.4rem;font-weight:500}
    .diff-unit-label{font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em}
    /* World clock */
    .tz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-bottom:1rem}
    .tz-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;position:relative}
    .tz-city{font-size:.82rem;font-weight:500;margin-bottom:.15rem}
    .tz-time{font-family:'DM Serif Display',serif;font-size:1.8rem;letter-spacing:-.01em;line-height:1}
    .tz-date{font-size:.72rem;color:var(--muted);margin-top:.2rem}
    .tz-offset{font-size:.68rem;color:var(--muted);margin-top:.1rem}
    .tz-del{position:absolute;top:.5rem;right:.6rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;transition:color .15s}
    .tz-del:hover{color:#e24b4a}
    .add-tz-row{display:flex;gap:.5rem;margin-bottom:.5rem}
    .add-tz-row select{flex:1}
    .add-btn{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:.6rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .2s}
    .add-btn:hover{opacity:.8}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.diff-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🌍 Utility</p>
  <h1>Time & World Clock</h1>
  <p class="subtitle">Calculate the difference between two dates/times, or check the current time in cities around the world.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('diff')">Time Difference</button>
    <button class="mode-tab" onclick="setMode('world')">World Clock</button>
  </div>

  <!-- TIME DIFF -->
  <div class="section visible" id="secDiff">
    <div class="card">
      <p class="card-title">Select two dates & times</p>
      <div class="diff-grid">
        <div class="field"><label>Start</label><input type="datetime-local" id="dtStart" oninput="calcDiff()" /></div>
        <div style="display:flex;align-items:flex-end;padding-bottom:.1rem"><button class="swap-btn" onclick="swapDates()">⇄</button></div>
        <div class="field"><label>End</label><input type="datetime-local" id="dtEnd" oninput="calcDiff()" /></div>
      </div>
    </div>
    <div class="result-box" id="diffResult">
      <div class="diff-big" id="diffBig">—</div>
      <div class="diff-label" id="diffLabel">Select two dates above</div>
      <div class="diff-breakdown" id="diffBreakdown"></div>
    </div>
  </div>

  <!-- WORLD CLOCK -->
  <div class="section" id="secWorld">
    <div class="card">
      <p class="card-title">Add a city</p>
      <div class="add-tz-row">
        <select id="tzSelect"></select>
        <button class="add-btn" onclick="addTz()">+ Add</button>
      </div>
    </div>
    <div class="tz-grid" id="tzGrid"></div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  // ── Mode ──
  function setMode(m){
    document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='diff')||(i===1&&m==='world')));
    document.getElementById('secDiff').classList.toggle('visible',m==='diff');
    document.getElementById('secWorld').classList.toggle('visible',m==='world');
  }

  // ── Time Diff ──
  function pad2(n){return String(Math.floor(n)).padStart(2,'0');}
  function setNow(){
    const now=new Date();
    const local=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
    document.getElementById('dtStart').value=local;
    const end=new Date(now.getTime()-now.getTimezoneOffset()*60000+3600000).toISOString().slice(0,16);
    document.getElementById('dtEnd').value=end;
    calcDiff();
  }
  function swapDates(){const a=document.getElementById('dtStart').value,b=document.getElementById('dtEnd').value;document.getElementById('dtStart').value=b;document.getElementById('dtEnd').value=a;calcDiff();}
  function calcDiff(){
    const s=document.getElementById('dtStart').value;
    const e=document.getElementById('dtEnd').value;
    if(!s||!e)return;
    let ms=new Date(e)-new Date(s);
    const neg=ms<0;if(neg)ms=-ms;
    const totalSec=Math.floor(ms/1000);
    const days=Math.floor(ms/86400000);
    const hrs=Math.floor((ms%86400000)/3600000);
    const mins=Math.floor((ms%3600000)/60000);
    const secs=Math.floor((ms%60000)/1000);
    const totalHrs=(ms/3600000).toFixed(2);
    const totalMins=Math.floor(ms/60000).toLocaleString();
    document.getElementById('diffBig').textContent=(neg?'−':'')+days+'d '+pad2(hrs)+'h '+pad2(mins)+'m';
    document.getElementById('diffLabel').textContent=neg?'End is before start':'Difference';
    document.getElementById('diffBreakdown').innerHTML=`
      <div class="diff-unit"><div class="diff-unit-val">${days.toLocaleString()}</div><div class="diff-unit-label">Days</div></div>
      <div class="diff-unit"><div class="diff-unit-val">${totalHrs}</div><div class="diff-unit-label">Total hours</div></div>
      <div class="diff-unit"><div class="diff-unit-val">${totalMins}</div><div class="diff-unit-label">Total minutes</div></div>
      <div class="diff-unit"><div class="diff-unit-val">${totalSec.toLocaleString()}</div><div class="diff-unit-label">Total seconds</div></div>`;
  }
  setNow();

  // ── World Clock ──
  const TIMEZONES=[
    {city:'New York',tz:'America/New_York'},{city:'Los Angeles',tz:'America/Los_Angeles'},{city:'Chicago',tz:'America/Chicago'},
    {city:'London',tz:'Europe/London'},{city:'Paris',tz:'Europe/Paris'},{city:'Berlin',tz:'Europe/Berlin'},
    {city:'Dubai',tz:'Asia/Dubai'},{city:'Mumbai',tz:'Asia/Kolkata'},{city:'Singapore',tz:'Asia/Singapore'},
    {city:'Tokyo',tz:'Asia/Tokyo'},{city:'Sydney',tz:'Australia/Sydney'},{city:'Auckland',tz:'Pacific/Auckland'},
    {city:'São Paulo',tz:'America/Sao_Paulo'},{city:'Mexico City',tz:'America/Mexico_City'},{city:'Toronto',tz:'America/Toronto'},
    {city:'Nairobi',tz:'Africa/Nairobi'},{city:'Cairo',tz:'Africa/Cairo'},{city:'Johannesburg',tz:'Africa/Johannesburg'},
    {city:'Moscow',tz:'Europe/Moscow'},{city:'Istanbul',tz:'Europe/Istanbul'},{city:'Seoul',tz:'Asia/Seoul'},
    {city:'Bangkok',tz:'Asia/Bangkok'},{city:'Jakarta',tz:'Asia/Jakarta'},{city:'Hong Kong',tz:'Asia/Hong_Kong'},
    {city:'Shanghai',tz:'Asia/Shanghai'},{city:'Karachi',tz:'Asia/Karachi'},{city:'Lagos',tz:'Africa/Lagos'},
    {city:'Riyadh',tz:'Asia/Riyadh'},{city:'Athens',tz:'Europe/Athens'},{city:'Amsterdam',tz:'Europe/Amsterdam'},
  ];

  const sel=document.getElementById('tzSelect');
  TIMEZONES.forEach(t=>{const o=document.createElement('option');o.value=t.tz;o.textContent=t.city+' ('+t.tz+')';sel.appendChild(o);});

  let activeTzs=[
    {city:'New York',tz:'America/New_York'},{city:'London',tz:'Europe/London'},
    {city:'Tokyo',tz:'Asia/Tokyo'},{city:'Sydney',tz:'Australia/Sydney'},
  ];

  function addTz(){
    const val=sel.value;
    const found=TIMEZONES.find(t=>t.tz===val);
    if(!found||activeTzs.find(t=>t.tz===val))return;
    activeTzs.push(found);renderTzGrid();
  }
  function removeTz(tz){activeTzs=activeTzs.filter(t=>t.tz!==tz);renderTzGrid();}

  function renderTzGrid(){
    const grid=document.getElementById('tzGrid');grid.innerHTML='';
    activeTzs.forEach(t=>{
      const div=document.createElement('div');div.className='tz-card';div.dataset.tz=t.tz;
      div.innerHTML=`<button class="tz-del" onclick="removeTz('${t.tz}')">✕</button>
        <div class="tz-city">${t.city}</div>
        <div class="tz-time tz-time-val"></div>
        <div class="tz-date tz-date-val"></div>
        <div class="tz-offset tz-offset-val"></div>`;
      grid.appendChild(div);
    });
  }

  function tickWorld(){
    const now=new Date();
    document.querySelectorAll('.tz-card').forEach(card=>{
      const tz=card.dataset.tz;
      const timeStr=now.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const dateStr=now.toLocaleDateString('en-US',{timeZone:tz,weekday:'short',month:'short',day:'numeric'});
      const offsetMs=new Date(now.toLocaleString('en-US',{timeZone:tz})).getTime()-new Date(now.toLocaleString('en-US',{timeZone:'UTC'})).getTime();
      const offsetHr=offsetMs/3600000;
      const offsetStr='UTC'+(offsetHr>=0?'+':'')+offsetHr;
      card.querySelector('.tz-time-val').textContent=timeStr;
      card.querySelector('.tz-date-val').textContent=dateStr;
      card.querySelector('.tz-offset-val').textContent=offsetStr;
    });
  }

  renderTzGrid();
  tickWorld();
  setInterval(tickWorld,1000);
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
