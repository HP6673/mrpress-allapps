<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Sorter — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:760px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
    textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:'DM Sans',monospace;font-size:.95rem;color:var(--ink);resize:vertical;min-height:140px;outline:none;transition:border-color .2s;line-height:1.7}
    textarea:focus{border-color:var(--ink)}
    textarea::placeholder{color:var(--muted)}
    .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .opt-group{display:flex;flex-direction:column;gap:.5rem}
    .opt-group label{font-size:.78rem;color:var(--muted)}
    .btn-group{display:flex;gap:.4rem;flex-wrap:wrap}
    .opt-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.45rem .9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .opt-btn:hover{border-color:var(--ink);color:var(--ink)}
    .opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .toggle-row{display:flex;align-items:center;gap:.6rem;font-size:.85rem;cursor:pointer;margin-top:.3rem}
    .toggle-row input{width:16px;height:16px;accent-color:var(--ink);cursor:pointer}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem}
    .stat-cell{background:var(--card);padding:.9rem .75rem;text-align:center}
    .stat-val{font-family:'DM Serif Display',serif;font-size:1.4rem;letter-spacing:-.02em;word-break:break-all}
    .stat-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
    .output-wrap{position:relative}
    .output-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem 1rem 3rem;font-family:'DM Sans',monospace;font-size:.95rem;color:var(--ink);min-height:100px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .output-actions{position:absolute;bottom:.6rem;right:.75rem;display:flex;gap:.5rem}
    .out-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:.3rem .8rem;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .2s}
    .out-btn:hover{border-color:var(--ink);color:var(--ink)}
    .sort-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:1rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s;margin-bottom:1rem}
    .sort-btn:hover{opacity:.8}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.options-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🔢 Utility</p>
  <h1>Number Sorter</h1>
  <p class="subtitle">Paste a list of numbers and sort them instantly. Supports any separator — commas, spaces, newlines, or mixed.</p>

  <div class="card">
    <p class="card-title">Input numbers</p>
    <textarea id="input" placeholder="Paste numbers here — separated by commas, spaces, or new lines&#10;e.g. 42, 7, 100, 3.14, -5, 88"></textarea>
  </div>

  <div class="card">
    <p class="card-title">Options</p>
    <div class="options-grid">
      <div class="opt-group">
        <label>Sort order</label>
        <div class="btn-group">
          <button class="opt-btn active" data-order="asc">↑ Ascending</button>
          <button class="opt-btn" data-order="desc">↓ Descending</button>
        </div>
      </div>
      <div class="opt-group">
        <label>Output separator</label>
        <div class="btn-group">
          <button class="opt-btn active" data-sep="comma">Comma</button>
          <button class="opt-btn" data-sep="newline">New line</button>
          <button class="opt-btn" data-sep="space">Space</button>
        </div>
      </div>
      <div class="opt-group">
        <label>Extra options</label>
        <label class="toggle-row"><input type="checkbox" id="removeDups" /> Remove duplicates</label>
        <label class="toggle-row"><input type="checkbox" id="removeNeg" /> Remove negatives</label>
      </div>
      <div class="opt-group">
        <label>Number format</label>
        <div class="btn-group">
          <button class="opt-btn active" data-fmt="keep">Keep as-is</button>
          <button class="opt-btn" data-fmt="int">Integers only</button>
          <button class="opt-btn" data-fmt="2dp">2 decimal places</button>
        </div>
      </div>
    </div>
  </div>

  <button class="sort-btn" onclick="sort()">↕ Sort Numbers</button>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-cell"><div class="stat-val" id="statCount">—</div><div class="stat-label">Count</div></div>
    <div class="stat-cell"><div class="stat-val" id="statSum">—</div><div class="stat-label">Sum</div></div>
    <div class="stat-cell"><div class="stat-val" id="statMin">—</div><div class="stat-label">Min</div></div>
    <div class="stat-cell"><div class="stat-val" id="statMax">—</div><div class="stat-label">Max</div></div>
  </div>

  <div class="card">
    <p class="card-title">Sorted output</p>
    <div class="output-wrap">
      <div class="output-box" id="output">Your sorted numbers will appear here.</div>
      <div class="output-actions">
        <button class="out-btn" onclick="copyOutput()">Copy</button>
        <button class="out-btn" onclick="clearAll()">Clear</button>
      </div>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let order = 'asc', sep = 'comma', fmt = 'keep';

  document.querySelectorAll('[data-order]').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); order = btn.dataset.order;
  }));
  document.querySelectorAll('[data-sep]').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sep]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); sep = btn.dataset.sep;
  }));
  document.querySelectorAll('[data-fmt]').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('[data-fmt]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); fmt = btn.dataset.fmt;
  }));

  function sort() {
    const raw = document.getElementById('input').value;
    if (!raw.trim()) return;

    // Parse — split on any combo of commas, spaces, newlines, semicolons, tabs
    let nums = raw.split(/[\s,;\t]+/).map(s => s.trim()).filter(s => s !== '').map(Number).filter(n => !isNaN(n));

    if (!nums.length) { document.getElementById('output').textContent = 'No valid numbers found.'; return; }

    if (document.getElementById('removeDups').checked) nums = [...new Set(nums)];
    if (document.getElementById('removeNeg').checked) nums = nums.filter(n => n >= 0);

    nums.sort((a, b) => order === 'asc' ? a - b : b - a);

    const formatted = nums.map(n => {
      if (fmt === 'int') return Math.round(n);
      if (fmt === '2dp') return parseFloat(n.toFixed(2));
      return n;
    });

    const separator = sep === 'comma' ? ', ' : sep === 'newline' ? '\n' : ' ';
    document.getElementById('output').textContent = formatted.join(separator);

    // Stats
    const sum = nums.reduce((a,b)=>a+b,0);
    document.getElementById('statCount').textContent = nums.length;
    document.getElementById('statSum').textContent   = parseFloat(sum.toFixed(4));
    document.getElementById('statMin').textContent   = nums[order==='asc'?0:nums.length-1];
    document.getElementById('statMax').textContent   = nums[order==='asc'?nums.length-1:0];
    document.getElementById('statsRow').style.display = 'grid';
  }

  function copyOutput() {
    const t = document.getElementById('output').textContent;
    if (t === 'Your sorted numbers will appear here.' || t === 'No valid numbers found.') return;
    navigator.clipboard.writeText(t).then(() => {
      const btn = document.querySelector('.out-btn');
      btn.textContent = '✓'; setTimeout(() => btn.textContent = 'Copy', 1400);
    });
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').textContent = 'Your sorted numbers will appear here.';
    document.getElementById('statsRow').style.display = 'none';
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
