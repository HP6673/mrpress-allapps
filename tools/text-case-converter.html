<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Case Converter — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:760px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.6rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);resize:vertical;min-height:120px;outline:none;transition:border-color .2s;line-height:1.7}
    textarea:focus{border-color:var(--ink)}
    textarea::placeholder{color:var(--muted)}
    .case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;margin-bottom:1rem}
    .case-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:left;line-height:1.4}
    .case-btn:hover{border-color:var(--ink);color:var(--ink)}
    .case-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .case-btn small{display:block;font-weight:300;font-size:.72rem;opacity:.7;margin-top:.15rem}
    .output-wrap{position:relative}
    .output-box{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem 1rem 2.8rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);min-height:80px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .output-actions{position:absolute;bottom:.6rem;right:.75rem;display:flex;gap:.5rem}
    .out-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:.3rem .8rem;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .2s}
    .out-btn:hover{border-color:var(--ink);color:var(--ink)}
    .stats-row{display:flex;gap:1.5rem;font-size:.8rem;color:var(--muted);margin-top:.5rem}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.case-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">Aa Text</p>
  <h1>Text Case Converter</h1>
  <p class="subtitle">Paste your text, click a case — instantly converted. Perfect for titles, code, and copy editing.</p>

  <div class="card">
    <p class="card-title">Input text</p>
    <textarea id="input" placeholder="Type or paste your text here…" oninput="convert()"></textarea>
  </div>

  <div class="case-grid" id="caseGrid">
    <button class="case-btn active" data-case="upper">UPPER CASE<small>ALL CAPS</small></button>
    <button class="case-btn" data-case="lower">lower case<small>all lowercase</small></button>
    <button class="case-btn" data-case="title">Title Case<small>Every Word Capitalised</small></button>
    <button class="case-btn" data-case="sentence">Sentence case<small>First letter only</small></button>
    <button class="case-btn" data-case="camel">camelCase<small>forCodeVariables</small></button>
    <button class="case-btn" data-case="pascal">PascalCase<small>ForClassNames</small></button>
    <button class="case-btn" data-case="snake">snake_case<small>for_python_vars</small></button>
    <button class="case-btn" data-case="kebab">kebab-case<small>for-css-classes</small></button>
    <button class="case-btn" data-case="const">CONSTANT_CASE<small>FOR_CONSTANTS</small></button>
    <button class="case-btn" data-case="alternating">aLtErNaTiNg<small>Mocking SpongeBob</small></button>
  </div>

  <div class="card">
    <p class="card-title">Output</p>
    <div class="output-wrap">
      <div class="output-box" id="output">Your converted text will appear here.</div>
      <div class="output-actions">
        <button class="out-btn" onclick="copyOutput()">Copy</button>
        <button class="out-btn" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div class="stats-row"><span id="stat-chars">0 characters</span><span id="stat-words">0 words</span></div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let activeCase = 'upper';

  document.getElementById('caseGrid').addEventListener('click', e => {
    const btn = e.target.closest('.case-btn');
    if (!btn) return;
    document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCase = btn.dataset.case;
    convert();
  });

  const SMALL_WORDS = new Set(['a','an','the','and','but','or','for','nor','on','at','to','by','in','of','up','as','is']);

  function applyCase(text, c) {
    switch(c) {
      case 'upper': return text.toUpperCase();
      case 'lower': return text.toLowerCase();
      case 'title': return text.toLowerCase().split(' ').map((w,i)=>SMALL_WORDS.has(w)&&i>0?w:w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      case 'sentence': return text.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c=>c.toUpperCase());
      case 'camel': return text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()).replace(/^./,c=>c.toLowerCase());
      case 'pascal': return text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()).replace(/^./,c=>c.toUpperCase());
      case 'snake': return text.toLowerCase().replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
      case 'kebab': return text.toLowerCase().replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');
      case 'const': return text.toUpperCase().replace(/\s+/g,'_').replace(/[^A-Z0-9_]/g,'');
      case 'alternating': return text.split('').map((ch,i)=>i%2===0?ch.toLowerCase():ch.toUpperCase()).join('');
      default: return text;
    }
  }

  function convert() {
    const input = document.getElementById('input').value;
    const out = input ? applyCase(input, activeCase) : 'Your converted text will appear here.';
    document.getElementById('output').textContent = out;
    const words = input.trim() ? input.trim().split(/\s+/).length : 0;
    document.getElementById('stat-chars').textContent = input.length + ' characters';
    document.getElementById('stat-words').textContent = words + ' words';
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.out-btn');
      btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1400);
    });
  }

  function clearAll() {
    document.getElementById('input').value = '';
    convert();
  }
</script>
<script src="../ad.js"></script>
</body>
</html>
