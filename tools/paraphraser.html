<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paraphraser — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:900px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1rem}
    .panel-box{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
    .panel-head{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
    .char-count{font-size:.75rem;color:var(--muted)}
    textarea{flex:1;width:100%;background:transparent;border:none;padding:1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);resize:none;outline:none;line-height:1.7;min-height:240px}
    textarea::placeholder{color:var(--muted)}
    .output-area{flex:1;padding:1rem;font-size:.95rem;line-height:1.7;color:var(--ink);min-height:240px;white-space:pre-wrap;word-break:break-word}
    .output-area.placeholder{color:var(--muted);font-style:italic}
    .output-area.streaming::after{content:'▋';animation:blink .7s step-end infinite;color:var(--muted)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .controls-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.4rem;margin-bottom:1rem}
    .controls-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
    .tone-grid{display:flex;gap:.5rem;flex-wrap:wrap}
    .tone-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:99px;padding:.35rem .9rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .tone-btn:hover{border-color:var(--ink);color:var(--ink)}
    .tone-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .action-row{display:flex;gap:.75rem}
    .btn{flex:1;padding:.9rem;border-radius:8px;font-family:'DM Serif Display',serif;font-size:1.05rem;cursor:pointer;transition:all .2s;border:none;text-align:center}
    .btn-primary{background:var(--ink);color:#fff}
    .btn-primary:hover{opacity:.8}
    .btn-primary:disabled{opacity:.35;cursor:not-allowed}
    .btn-secondary{flex:0;padding:.9rem 1.4rem;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:760px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">✍️ Text</p>
  <h1>Paraphraser</h1>
  <p class="subtitle">Rewrite any text in a different tone or style — powered by AI.</p>

  <div class="controls-card">
    <p class="card-title">Tone</p>
    <div class="tone-grid" id="toneGrid">
      <button class="tone-btn active" data-tone="Standard">Standard</button>
      <button class="tone-btn" data-tone="Formal">Formal</button>
      <button class="tone-btn" data-tone="Casual">Casual</button>
      <button class="tone-btn" data-tone="Simple">Simpler</button>
      <button class="tone-btn" data-tone="Fluent">More fluent</button>
      <button class="tone-btn" data-tone="Creative">Creative</button>
      <button class="tone-btn" data-tone="Concise">Concise</button>
      <button class="tone-btn" data-tone="Expand">Expand</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel-box">
      <div class="panel-head">
        <span>Original text</span>
        <span class="char-count" id="inputCount">0 words</span>
      </div>
      <textarea id="inputText" placeholder="Paste or type the text you want to paraphrase…" oninput="countWords()"></textarea>
    </div>
    <div class="panel-box">
      <div class="panel-head">
        <span>Paraphrased</span>
        <span class="char-count" id="outputCount"></span>
      </div>
      <div class="output-area placeholder" id="outputArea">Your paraphrased text will appear here.</div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn btn-primary" id="paraphraseBtn" onclick="paraphrase()">✍️ Paraphrase</button>
    <button class="btn-secondary" onclick="copyOutput()">Copy</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let activeTone = 'Standard';
  let streaming = false;

  document.getElementById('toneGrid').addEventListener('click', e => {
    const btn = e.target.closest('.tone-btn');
    if (!btn) return;
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTone = btn.dataset.tone;
  });

  function countWords() {
    const text = document.getElementById('inputText').value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    document.getElementById('inputCount').textContent = words + ' words';
  }

  async function paraphrase() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { alert('Please enter some text first.'); return; }
    if (streaming) return;

    const btn = document.getElementById('paraphraseBtn');
    const output = document.getElementById('outputArea');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Paraphrasing…';
    output.classList.remove('placeholder');
    output.classList.add('streaming');
    output.textContent = '';
    streaming = true;

    const tonePrompts = {
      Standard:  'Paraphrase the following text. Keep the same meaning but use different words and sentence structures.',
      Formal:    'Paraphrase the following text in a formal, professional tone suitable for business or academic writing.',
      Casual:    'Paraphrase the following text in a casual, conversational tone as if talking to a friend.',
      Simple:    'Paraphrase the following text using simpler words and shorter sentences so it is easy to understand.',
      Fluent:    'Paraphrase the following text to make it flow more naturally and sound more polished.',
      Creative:  'Paraphrase the following text in a creative and engaging way, using vivid language.',
      Concise:   'Paraphrase the following text as concisely as possible, keeping only the key points.',
      Expand:    'Paraphrase and expand the following text with more detail and explanation while keeping the original meaning.',
    };

    const systemPrompt = tonePrompts[activeTone] + ' Output only the paraphrased text with no preamble, explanation, or quotation marks.';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          stream: true,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            if (json.type === 'content_block_delta' && json.delta?.text) {
              output.textContent += json.delta.text;
            }
          } catch {}
        }
      }

      const words = output.textContent.trim().split(/\s+/).length;
      document.getElementById('outputCount').textContent = words + ' words';
    } catch (err) {
      output.textContent = 'Something went wrong. Please try again.';
      output.classList.add('placeholder');
    }

    output.classList.remove('streaming');
    streaming = false;
    btn.disabled = false;
    btn.textContent = '✍️ Paraphrase';
  }

  function copyOutput() {
    const text = document.getElementById('outputArea').textContent;
    if (!text || text === 'Your paraphrased text will appear here.') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelectorAll('.btn-secondary')[0];
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.textContent = 'Copy', 1400);
    });
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputArea').textContent = 'Your paraphrased text will appear here.';
    document.getElementById('outputArea').classList.add('placeholder');
    document.getElementById('inputCount').textContent = '0 words';
    document.getElementById('outputCount').textContent = '';
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
