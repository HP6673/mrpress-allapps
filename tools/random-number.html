<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number Generator — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:620px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
    .range-row{display:grid;grid-template-columns:1fr auto 1fr;gap:.75rem;align-items:end;margin-bottom:1rem}
    .field{display:flex;flex-direction:column;gap:.4rem}
    .field label{font-size:.82rem;color:var(--muted)}
    input[type="number"]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.65rem 1rem;font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--ink);outline:none;transition:border-color .2s;text-align:center}
    input[type="number"]:focus{border-color:var(--ink)}
    .sep{font-size:.9rem;color:var(--muted);padding-bottom:.8rem;text-align:center}
    .qty-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
    .qty-row label{font-size:.82rem;color:var(--muted)}
    .qb{background:var(--bg);border:1.5px solid var(--border);border-radius:99px;padding:.3rem .9rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .qb:hover{border-color:var(--ink);color:var(--ink)}
    .qb.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .opt{display:flex;align-items:center;gap:.5rem;font-size:.85rem;cursor:pointer}
    .opt input{accent-color:var(--ink);cursor:pointer;width:15px;height:15px}
    .gen-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:1rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s;margin-top:.75rem}
    .gen-btn:hover{opacity:.8}
    .result-hero{background:var(--ink);color:#fff;border-radius:12px;padding:2.5rem;text-align:center;margin-bottom:1rem;cursor:pointer;display:none}
    .result-hero:active{transform:scale(.98)}
    .rn{font-family:'DM Serif Display',serif;font-size:5.5rem;letter-spacing:-.03em;line-height:1;word-break:break-all}
    .rs{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.6rem;letter-spacing:.07em;text-transform:uppercase}
    .mg{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1rem}
    .rp{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem 1.1rem;font-family:'DM Serif Display',serif;font-size:1.3rem}
    .hcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.3rem;display:none;margin-top:.5rem}
    .hlist{display:flex;flex-direction:column;gap:.3rem;max-height:160px;overflow-y:auto}
    .hr{display:flex;justify-content:space-between;font-size:.83rem;padding:.35rem .5rem;border-radius:5px;background:var(--bg)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.range-row{grid-template-columns:1fr}.sep{display:none}.rn{font-size:3.5rem}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🔢 Utility</p>
  <h1>Random Number</h1>
  <p class="subtitle">Generate one or more random numbers from any range. Press Space to regenerate.</p>
  <div class="card">
    <p class="card-title">Range & options</p>
    <div class="range-row">
      <div class="field"><label>Minimum</label><input type="number" id="mn" value="1" /></div>
      <div class="sep">to</div>
      <div class="field"><label>Maximum</label><input type="number" id="mx" value="100" /></div>
    </div>
    <div class="qty-row">
      <label>How many</label>
      <button class="qb active" data-q="1">1</button>
      <button class="qb" data-q="5">5</button>
      <button class="qb" data-q="10">10</button>
      <button class="qb" data-q="20">20</button>
    </div>
    <label class="opt"><input type="checkbox" id="nr" /> No repeated numbers</label>
    <button class="gen-btn" onclick="go()">⚡ Generate</button>
  </div>
  <div class="result-hero" id="hero" onclick="go()"><div class="rn" id="rn"></div><div class="rs">Click to regenerate</div></div>
  <div class="mg" id="mg"></div>
  <div class="hcard" id="hc"><p class="card-title" style="margin-bottom:.75rem">History</p><div class="hlist" id="hl"></div></div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let qty=1,hist=[];
  document.querySelectorAll('.qb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.qb').forEach(x=>x.classList.remove('active'));b.classList.add('active');qty=parseInt(b.dataset.q);}));
  function go(){
    const min=parseInt(document.getElementById('mn').value),max=parseInt(document.getElementById('mx').value);
    if(isNaN(min)||isNaN(max)||min>max){alert('Min must be ≤ Max');return;}
    const range=max-min+1,noRep=document.getElementById('nr').checked,aq=noRep?Math.min(qty,range):qty;
    let nums=[];
    if(noRep){const pool=Array.from({length:range},(_,i)=>min+i);for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}nums=pool.slice(0,aq);}
    else nums=Array.from({length:aq},()=>Math.floor(Math.random()*range)+min);
    const h=document.getElementById('hero'),mg=document.getElementById('mg');
    if(qty===1){h.style.display='block';document.getElementById('rn').textContent=nums[0];mg.innerHTML='';}
    else{h.style.display='none';mg.innerHTML=nums.map(n=>`<div class="rp">${n}</div>`).join('');}
    const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    hist.unshift({nums,time:now});if(hist.length>20)hist.pop();
    const hc=document.getElementById('hc');hc.style.display='block';
    document.getElementById('hl').innerHTML=hist.map(h=>`<div class="hr"><span style="font-weight:500">${h.nums.length===1?h.nums[0]:h.nums.join(', ')}</span><span style="color:var(--muted);font-size:.75rem">${h.time}</span></div>`).join('');
  }
  document.addEventListener('keydown',e=>{if(e.key===' '&&e.target===document.body){e.preventDefault();go();}});
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
