<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Comparison — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:900px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    /* Upload panels */
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
    .upload-box{border:1.5px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;background:var(--card);cursor:pointer;position:relative;transition:all .2s;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem}
    .upload-box:hover,.upload-box.drag-over{border-color:var(--ink);background:#faf9f5}
    .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-box.loaded{border-style:solid;border-color:var(--border)}
    .upload-icon{font-size:1.5rem}
    .upload-label{font-size:.85rem;font-family:'DM Serif Display',serif}
    .upload-sub{font-size:.75rem;color:var(--muted)}
    .upload-thumb{width:100%;height:80px;object-fit:cover;border-radius:6px;display:block;margin-bottom:.4rem}
    /* Comparison slider */
    .compare-wrap{position:relative;overflow:hidden;border-radius:12px;background:#111;margin-bottom:1rem;display:none;cursor:col-resize;user-select:none;-webkit-user-select:none}
    .compare-wrap img{display:block;width:100%;height:auto;max-height:560px;object-fit:contain}
    .img-before{position:absolute;inset:0;overflow:hidden}
    .img-before img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
    .img-after{display:block;width:100%;height:100%}
    .divider{position:absolute;top:0;bottom:0;width:3px;background:#fff;box-shadow:0 0 8px rgba(0,0,0,.5);cursor:col-resize;z-index:10}
    .divider-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:#fff;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:col-resize}
    .label-left,.label-right{position:absolute;top:.75rem;padding:.25rem .75rem;background:rgba(0,0,0,.55);color:#fff;font-size:.75rem;border-radius:99px;pointer-events:none;z-index:5;font-family:'DM Sans',sans-serif}
    .label-left{left:.75rem}
    .label-right{right:.75rem}
    .controls-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
    .lbl-input{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.45rem .75rem;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--ink);outline:none;width:140px;transition:border-color .2s}
    .lbl-input:focus{border-color:var(--ink)}
    .reset-btn{background:transparent;border:1.5px solid var(--border);border-radius:7px;padding:.5rem 1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .2s}
    .reset-btn:hover{border-color:var(--ink);color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.upload-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🖼️ Image</p>
  <h1>Image Comparison</h1>
  <p class="subtitle">Upload two images and drag the slider to compare them side by side. Perfect for before/after comparisons.</p>

  <div class="upload-grid">
    <div class="upload-box" id="boxA">
      <input type="file" id="fileA" accept="image/*" onchange="loadImage('A',this)" />
      <span class="upload-icon">📷</span>
      <span class="upload-label">Before / Left</span>
      <span class="upload-sub">Click or drop image</span>
    </div>
    <div class="upload-box" id="boxB">
      <input type="file" id="fileB" accept="image/*" onchange="loadImage('B',this)" />
      <span class="upload-icon">📷</span>
      <span class="upload-label">After / Right</span>
      <span class="upload-sub">Click or drop image</span>
    </div>
  </div>

  <div class="controls-row" id="controlsRow" style="display:none">
    <input type="text" class="lbl-input" id="lblA" value="Before" oninput="updateLabels()" placeholder="Left label" />
    <input type="text" class="lbl-input" id="lblB" value="After" oninput="updateLabels()" placeholder="Right label" />
    <button class="reset-btn" onclick="resetAll()">↩ Reset</button>
  </div>

  <div class="compare-wrap" id="compareWrap">
    <img class="img-after" id="imgB" src="" alt="After" />
    <div class="img-before" id="clipBefore">
      <img id="imgA" src="" alt="Before" />
    </div>
    <div class="divider" id="divider">
      <div class="divider-handle">⇔</div>
    </div>
    <span class="label-left" id="labelLeft">Before</span>
    <span class="label-right" id="labelRight">After</span>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let loadedA=false, loadedB=false;
  let sliderPct=50, dragging=false;

  function loadImage(side, input) {
    if (!input.files[0]) return;
    const url = URL.createObjectURL(input.files[0]);
    const box = document.getElementById('box'+side);
    if (side==='A') {
      document.getElementById('imgA').src=url;
      loadedA=true;
    } else {
      document.getElementById('imgB').src=url;
      loadedB=true;
    }
    // Update upload box preview
    box.innerHTML = `<img class="upload-thumb" src="${url}" alt="" /><span class="upload-sub">${input.files[0].name}</span>`;
    box.classList.add('loaded');
    // Re-attach input so user can change again
    const inp = document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.style.cssText='position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%';
    inp.onchange=()=>loadImage(side,inp);
    box.appendChild(inp);

    if (loadedA && loadedB) showComparison();
  }

  function showComparison() {
    document.getElementById('compareWrap').style.display='block';
    document.getElementById('controlsRow').style.display='flex';
    setSlider(50);
  }

  function setSlider(pct) {
    sliderPct=pct;
    document.getElementById('divider').style.left=pct+'%';
    document.getElementById('clipBefore').style.width=pct+'%';
  }

  // Drag handling
  const wrap = document.getElementById('compareWrap');
  wrap.addEventListener('mousedown', e=>{ dragging=true; move(e); });
  wrap.addEventListener('touchstart', e=>{ dragging=true; move(e.touches[0]); },{passive:true});
  document.addEventListener('mousemove', e=>{ if(dragging) move(e); });
  document.addEventListener('touchmove', e=>{ if(dragging) move(e.touches[0]); },{passive:true});
  document.addEventListener('mouseup', ()=>dragging=false);
  document.addEventListener('touchend', ()=>dragging=false);

  function move(e) {
    const rect=wrap.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const pct=Math.max(0,Math.min(100,(x/rect.width)*100));
    setSlider(pct);
  }

  function updateLabels() {
    document.getElementById('labelLeft').textContent=document.getElementById('lblA').value||'Before';
    document.getElementById('labelRight').textContent=document.getElementById('lblB').value||'After';
  }

  function resetAll() {
    loadedA=false;loadedB=false;
    ['A','B'].forEach(s=>{
      const box=document.getElementById('box'+s);
      const isA=s==='A';
      box.className='upload-box';
      box.innerHTML=`<input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%" onchange="loadImage('${s}',this)"><span class="upload-icon">📷</span><span class="upload-label">${isA?'Before / Left':'After / Right'}</span><span class="upload-sub">Click or drop image</span>`;
    });
    document.getElementById('compareWrap').style.display='none';
    document.getElementById('controlsRow').style.display='none';
  }

  // Drag on upload boxes
  ['A','B'].forEach(s=>{
    const box=document.getElementById('box'+s);
    box.addEventListener('dragover',e=>{e.preventDefault();box.classList.add('drag-over')});
    box.addEventListener('dragleave',()=>box.classList.remove('drag-over'));
    box.addEventListener('drop',e=>{e.preventDefault();box.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const inp=box.querySelector('input');const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;loadImage(s,inp);}});
  });
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
