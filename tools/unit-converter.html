<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter — All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f7f6f2; --ink:#111; --muted:#888; --border:#e5e3dc; --card:#fff; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:1.6rem 4rem; border-bottom:1px solid var(--border); }
    .logo { font-family:'DM Serif Display',serif; font-size:1.3rem; letter-spacing:-.02em; text-decoration:none; color:var(--ink); }
    .logo span { color:var(--muted); }
    .back-link { font-size:.85rem; color:var(--muted); text-decoration:none; transition:color .2s; }
    .back-link:hover { color:var(--ink); }
    main { flex:1; padding:3.5rem 4rem 5rem; max-width:720px; margin:0 auto; width:100%; }
    .eyebrow { font-size:.73rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
    h1 { font-family:'DM Serif Display',serif; font-size:2.8rem; letter-spacing:-.025em; margin-bottom:.5rem; }
    .subtitle { color:var(--muted); font-size:.95rem; margin-bottom:2rem; line-height:1.6; }

    /* Category tabs */
    .cat-tabs { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .cat-btn { background:transparent; border:1.5px solid var(--border); border-radius:8px; padding:.45rem 1.1rem; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; }
    .cat-btn:hover { border-color:var(--ink); color:var(--ink); }
    .cat-btn.active { background:var(--ink); border-color:var(--ink); color:#fff; }

    /* Converter card */
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1rem; }
    .convert-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:0; }
    .input-side { padding:1.4rem 1.6rem; }
    .input-side label { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:.5rem; }
    .input-side input { width:100%; background:transparent; border:none; font-family:'DM Serif Display',serif; font-size:2rem; color:var(--ink); outline:none; }
    .input-side input::placeholder { color:var(--border); }
    .unit-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:.5rem .75rem; font-family:'DM Sans',sans-serif; font-size:.88rem; color:var(--ink); outline:none; cursor:pointer; margin-top:.4rem; }
    .arrow-col { display:flex; align-items:center; justify-content:center; width:40px; color:var(--muted); font-size:1.2rem; border-left:1px solid var(--border); border-right:1px solid var(--border); height:100%; padding:1rem 0; }
    .output-side { padding:1.4rem 1.6rem; background:#fafaf7; }
    .output-side label { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:.5rem; }
    .output-val { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--ink); min-height:2.4rem; word-break:break-all; }
    .output-unit { font-size:.88rem; color:var(--muted); margin-top:.4rem; }

    /* Quick reference */
    .ref-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.4rem 1.6rem; }
    .ref-title { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:.8rem; }
    .ref-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:.4rem; }
    .ref-item { font-size:.82rem; color:var(--muted); padding:.3rem 0; border-bottom:1px solid var(--border); }
    .ref-item strong { color:var(--ink); font-weight:500; }

    footer { border-top:1px solid var(--border); padding:1.5rem 4rem; font-size:.8rem; color:var(--muted); }
    @media(max-width:700px){ header,main,footer{padding-left:1.5rem;padding-right:1.5rem;} main{padding-top:2.5rem;} h1{font-size:2rem;} .convert-row{grid-template-columns:1fr;} .arrow-col{border:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);width:100%;height:40px;} }
  </style>
</head>
<body>
<header>
  <a class="logo" href="../index.html">All Apps <span>by MrPress</span></a>
  <a class="back-link" href="../index.html">← All tools</a>
</header>
<main>
  <p class="eyebrow">📐 Utility</p>
  <h1>Unit Converter</h1>
  <p class="subtitle">Convert between common units for length, weight, temperature, and volume.</p>

  <div class="cat-tabs" id="catTabs"></div>

  <div class="card">
    <div class="convert-row">
      <div class="input-side">
        <label>From</label>
        <input type="number" id="fromVal" placeholder="0" oninput="convert()" />
        <select class="unit-select" id="fromUnit" onchange="convert()"></select>
      </div>
      <div class="arrow-col">⇄</div>
      <div class="output-side">
        <label>To</label>
        <div class="output-val" id="toVal">—</div>
        <select class="unit-select" id="toUnit" onchange="convert()"></select>
      </div>
    </div>
  </div>

  <div class="ref-card">
    <p class="ref-title">Quick reference</p>
    <div class="ref-grid" id="refGrid"></div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
const CATEGORIES = {
  Length: {
    units: { mm:1, cm:10, m:1000, km:1e6, inch:25.4, ft:304.8, yd:914.4, mi:1609344 },
    ref: ['1 inch = 2.54 cm','1 ft = 30.48 cm','1 mi = 1.609 km','1 m = 3.281 ft','1 km = 0.621 mi']
  },
  Weight: {
    units: { mg:1, g:1000, kg:1e6, lb:453592, oz:28349.5, ton:1e9, st:6350293 },
    ref: ['1 kg = 2.205 lb','1 lb = 16 oz','1 stone = 14 lb','1 ton = 2205 lb']
  },
  Temperature: {
    special: true,
    units: ['°C','°F','K'],
    ref: ['0°C = 32°F = 273.15K','100°C = 212°F','37°C = 98.6°F (body)','−40°C = −40°F']
  },
  Volume: {
    units: { ml:1, l:1000, tsp:4.92892, tbsp:14.7868, floz:29.5735, cup:236.588, pt:473.176, qt:946.353, gal:3785.41, m3:1e6 },
    ref: ['1 cup = 237 ml','1 gal = 3.785 L','1 tbsp = 3 tsp','1 fl oz = 29.57 ml']
  }
};

let activeCat = 'Length';

function buildCatTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  Object.keys(CATEGORIES).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; buildCatTabs(); buildSelects(); convert(); };
    tabs.appendChild(btn);
  });
}

function buildSelects() {
  const cat   = CATEGORIES[activeCat];
  const from  = document.getElementById('fromUnit');
  const to    = document.getElementById('toUnit');
  const units = cat.special ? cat.units : Object.keys(cat.units);
  from.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
  to.innerHTML   = units.map(u => `<option value="${u}">${u}</option>`).join('');
  to.value = units[1] || units[0];
  buildRef();
}

function buildRef() {
  const ref  = CATEGORIES[activeCat].ref;
  const grid = document.getElementById('refGrid');
  grid.innerHTML = ref.map(r => `<div class="ref-item">${r}</div>`).join('');
}

function convert() {
  const raw = parseFloat(document.getElementById('fromVal').value);
  if (isNaN(raw)) { document.getElementById('toVal').textContent = '—'; return; }
  const cat  = CATEGORIES[activeCat];
  const from = document.getElementById('fromUnit').value;
  const to   = document.getElementById('toUnit').value;
  let result;
  if (cat.special) {
    // Temperature
    let celsius;
    if (from === '°C') celsius = raw;
    else if (from === '°F') celsius = (raw - 32) * 5/9;
    else celsius = raw - 273.15;
    if (to === '°C') result = celsius;
    else if (to === '°F') result = celsius * 9/5 + 32;
    else result = celsius + 273.15;
  } else {
    const base = raw * cat.units[from];
    result = base / cat.units[to];
  }
  const display = Math.abs(result) >= 1000 || (Math.abs(result) < 0.01 && result !== 0)
    ? result.toExponential(4)
    : parseFloat(result.toPrecision(7)).toString();
  document.getElementById('toVal').textContent = display;
}

buildCatTabs();
buildSelects();
convert();
</script>
<script src="../ad.js"></script>
</body>
</html>
