<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Counter — All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --ink: #111;
      --muted: #888;
      --border: #e5e3dc;
      --card-bg: #ffffff;
      --tag-bg: #efefeb;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 4rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
    }
    .logo span { color: var(--muted); font-weight: 300; }

    .back-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--ink); }

    main {
      flex: 1;
      padding: 4rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .tool-header {
      margin-bottom: 2.5rem;
    }

    .tool-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .tool-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tool-header p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 260px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.7;
    }
    textarea:focus { border-color: var(--ink); }
    textarea::placeholder { color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 1rem;
      background: var(--border);
    }

    .stat {
      background: var(--card-bg);
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.2rem;
    }

    button {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.75; }

    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    button.secondary:hover { color: var(--ink); border-color: var(--ink); opacity: 1; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      header, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      main { padding-top: 2.5rem; }
      .tool-header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="../index.html">All Apps <span>by MrPress</span></a>
    <a class="back-link" href="../index.html">← All tools</a>
  </header>

  <main>
    <div class="tool-header">
      <p class="tool-eyebrow">📝 Text</p>
      <h1>Word Counter</h1>
      <p>Paste or type your text below. Stats update as you type.</p>
    </div>

    <textarea id="input" placeholder="Start typing or paste your text here…"></textarea>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="words">0</span>
        <span class="stat-label">Words</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="chars">0</span>
        <span class="stat-label">Characters</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="charsNo">0</span>
        <span class="stat-label">No Spaces</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="sentences">0</span>
        <span class="stat-label">Sentences</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="paragraphs">0</span>
        <span class="stat-label">Paragraphs</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="readTime">0 min</span>
        <span class="stat-label">Read Time</span>
      </div>
    </div>

    <div class="actions">
      <button class="secondary" onclick="document.getElementById('input').value=''; update();">Clear</button>
      <button onclick="copyText()">Copy text</button>
    </div>
  </main>

  <footer>All Apps by MrPress</footer>

  <script>
    const input = document.getElementById('input');

    function update() {
      const text = input.value;
      const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      const chars = text.length;
      const charsNo = text.replace(/\s/g, '').length;
      const sentences = text.trim() === '' ? 0 : (text.match(/[.!?]+/g) || []).length;
      const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim()).length;
      const readTime = Math.max(1, Math.ceil(words / 200));

      document.getElementById('words').textContent = words.toLocaleString();
      document.getElementById('chars').textContent = chars.toLocaleString();
      document.getElementById('charsNo').textContent = charsNo.toLocaleString();
      document.getElementById('sentences').textContent = sentences.toLocaleString();
      document.getElementById('paragraphs').textContent = paragraphs.toLocaleString();
      document.getElementById('readTime').textContent = readTime + ' min';
    }

    function copyText() {
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector('button:not(.secondary)');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy text', 1500);
      });
    }

    input.addEventListener('input', update);
  </script>
  <script src="../ad.js"></script>
</body>
</html>
