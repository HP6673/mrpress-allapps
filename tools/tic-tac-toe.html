<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff;--x:#378add;--o:#e24b4a}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:2.5rem 4rem 4rem;max-width:560px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center}
    h1{font-family:'DM Serif Display',serif;font-size:2.4rem;letter-spacing:-.025em;margin-bottom:1.2rem;text-align:center}
    /* Opts */
    .opts-section{width:100%;margin-bottom:1rem}
    .opts-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
    .opts-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
    .opt-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .opt-btn:hover{border-color:var(--ink);color:var(--ink)}
    .opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    /* HUD */
    .hud{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;width:100%;margin-bottom:.75rem;align-items:center}
    .ph{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:.65rem .9rem;text-align:center;transition:border-color .25s,background .25s}
    .ph.active-x{border-color:var(--x);background:#f0f6ff}
    .ph.active-o{border-color:var(--o);background:#fff0f0}
    .ph-sym{font-size:1.5rem;font-weight:700}
    .ph-sym.x{color:var(--x)}.ph-sym.o{color:var(--o)}
    .ph-name{font-size:.72rem;color:var(--muted);margin-top:.1rem}
    .ph-score{font-family:'DM Serif Display',serif;font-size:1.6rem}
    .vs{text-align:center;font-size:.9rem;color:var(--muted)}
    /* Status */
    .status{text-align:center;font-size:.9rem;color:var(--muted);margin-bottom:.75rem;min-height:1.3rem}
    /* Board */
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;max-width:360px;margin-bottom:1rem}
    .cell{aspect-ratio:1;background:var(--card);border:2px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;user-select:none;-webkit-tap-highlight-color:transparent}
    .cell:hover:not(.taken){background:#f0efe9;transform:scale(.97)}
    .cell.x{color:var(--x);cursor:default}
    .cell.o{color:var(--o);cursor:default}
    .cell.win{background:#fffbee;border-color:#e8d98a;animation:winPulse .5s ease}
    .cell.x.win{background:#f0f6ff;border-color:var(--x)}
    .cell.o.win{background:#fff0f0;border-color:var(--o)}
    @keyframes winPulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
    .taken{cursor:default}
    /* Buttons */
    .action-row{display:flex;gap:.5rem;width:100%}
    .new-btn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.85rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:opacity .2s}
    .new-btn:hover{opacity:.8}
    .reset-btn{flex:0;padding:.85rem 1.2rem;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;white-space:nowrap}
    .reset-btn:hover{border-color:var(--ink);color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:600px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}h1{font-size:2rem}.cell{font-size:2.2rem;border-radius:8px}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <h1>Tic Tac Toe</h1>

  <div class="opts-section">
    <div class="opts-label">Mode</div>
    <div class="opts-row" id="modeRow">
      <button class="opt-btn active" data-m="bot">vs Bot</button>
      <button class="opt-btn" data-m="friend">vs Friend</button>
    </div>
    <div id="diffSection">
      <div class="opts-label">Bot difficulty</div>
      <div class="opts-row" id="diffRow">
        <button class="opt-btn" data-d="easy">Easy</button>
        <button class="opt-btn active" data-d="medium">Medium</button>
        <button class="opt-btn" data-d="hard">Hard</button>
        <button class="opt-btn" data-d="impossible">Impossible</button>
      </div>
    </div>
  </div>

  <div class="hud">
    <div class="ph active-x" id="ph1">
      <div class="ph-sym x">X</div>
      <div class="ph-name" id="n1">You</div>
      <div class="ph-score" id="s1">0</div>
    </div>
    <div class="vs">vs</div>
    <div class="ph" id="ph2">
      <div class="ph-sym o">O</div>
      <div class="ph-name" id="n2">Bot</div>
      <div class="ph-score" id="s2">0</div>
    </div>
  </div>

  <div class="status" id="status">Your turn (X)</div>

  <div class="board" id="board">
    <div class="cell" data-i="0" onclick="pick(0)"></div>
    <div class="cell" data-i="1" onclick="pick(1)"></div>
    <div class="cell" data-i="2" onclick="pick(2)"></div>
    <div class="cell" data-i="3" onclick="pick(3)"></div>
    <div class="cell" data-i="4" onclick="pick(4)"></div>
    <div class="cell" data-i="5" onclick="pick(5)"></div>
    <div class="cell" data-i="6" onclick="pick(6)"></div>
    <div class="cell" data-i="7" onclick="pick(7)"></div>
    <div class="cell" data-i="8" onclick="pick(8)"></div>
  </div>

  <div class="action-row">
    <button class="new-btn" onclick="newGame()">New game</button>
    <button class="reset-btn" onclick="resetScores()">Reset scores</button>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board=Array(9).fill(null),turn='X',mode='bot',diff='medium',scores={X:0,O:0},locked=false;

  document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.m;
    document.getElementById('diffSection').style.display=mode==='bot'?'block':'none';
    document.getElementById('n2').textContent=mode==='bot'?'Bot':'Player 2';
    newGame();
  }));
  document.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-d]').forEach(x=>x.classList.remove('active'));b.classList.add('active');diff=b.dataset.d;newGame();
  }));

  function cells(){return document.querySelectorAll('.cell');}
  function setStatus(msg){document.getElementById('status').textContent=msg;}

  function newGame(){
    board=Array(9).fill(null);turn='X';locked=false;
    cells().forEach(c=>{c.textContent='';c.className='cell';});
    updateHud();
    setStatus(mode==='bot'?'Your turn (X)':'Player 1\'s turn (X)');
  }

  function resetScores(){scores={X:0,O:0};document.getElementById('s1').textContent=0;document.getElementById('s2').textContent=0;newGame();}

  function updateHud(){
    document.getElementById('ph1').className='ph'+(turn==='X'?' active-x':'');
    document.getElementById('ph2').className='ph'+(turn==='O'?' active-o':'');
  }

  function checkWin(b,p){return WINS.find(w=>w.every(i=>b[i]===p))||null;}
  function checkDraw(b){return b.every(c=>c!==null);}

  function pick(i){
    if(locked||board[i]||turn==='O'&&mode==='bot')return;
    place(i,turn);
  }

  function place(i,player){
    board[i]=player;
    const c=document.querySelector(`.cell[data-i="${i}"]`);
    c.textContent=player;c.classList.add(player.toLowerCase(),'taken');
    const win=checkWin(board,player);
    if(win){
      win.forEach(idx=>document.querySelector(`.cell[data-i="${idx}"]`).classList.add('win'));
      scores[player]++;
      document.getElementById('s1').textContent=scores.X;document.getElementById('s2').textContent=scores.O;
      const winner=player==='X'?(mode==='bot'?'You win! 🎉':'Player 1 wins! 🎉'):(mode==='bot'?'Bot wins!':'Player 2 wins!');
      setStatus(winner);locked=true;return;
    }
    if(checkDraw(board)){setStatus("It's a draw!");locked=true;return;}
    turn=turn==='X'?'O':'X';updateHud();
    if(mode==='bot'&&turn==='O'){setStatus('Bot is thinking…');locked=true;setTimeout(botMove,400);}
    else setStatus(mode==='bot'?'Your turn (X)':`Player ${turn==='X'?1:2}'s turn (${turn})`);
  }

  // Minimax
  function minimax(b,isMax,depth,alpha,beta){
    const w=checkWin(b,'O');if(w)return 10-depth;
    const l=checkWin(b,'X');if(l)return depth-10;
    if(checkDraw(b))return 0;
    if(isMax){
      let best=-Infinity;
      for(let i=0;i<9;i++){if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,false,depth+1,alpha,beta));b[i]=null;alpha=Math.max(alpha,best);if(beta<=alpha)break;}}
      return best;
    } else {
      let best=Infinity;
      for(let i=0;i<9;i++){if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,true,depth+1,alpha,beta));b[i]=null;beta=Math.min(beta,best);if(beta<=alpha)break;}}
      return best;
    }
  }

  function botMove(){
    const empty=board.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
    let pick;
    if(diff==='easy'){
      // 80% random
      if(Math.random()<0.8){pick=empty[Math.floor(Math.random()*empty.length)];}
      else{pick=bestMove();}
    } else if(diff==='medium'){
      // Block wins, random otherwise
      pick=blockOrWin('O')||blockOrWin('X')||(Math.random()<0.5?empty[Math.floor(Math.random()*empty.length)]:bestMove());
    } else if(diff==='hard'){
      // Win/block, then semi-optimal
      pick=blockOrWin('O')||blockOrWin('X')||(Math.random()<0.2?empty[Math.floor(Math.random()*empty.length)]:bestMove());
    } else {
      // Impossible — full minimax
      pick=bestMove();
    }
    locked=false;place(pick,'O');
  }

  function blockOrWin(p){
    for(const i of board.map((v,i)=>v===null?i:-1).filter(i=>i>=0)){
      const t=[...board];t[i]=p;if(checkWin(t,p))return i;
    }return null;
  }

  function bestMove(){
    let best=-Infinity,pick=0;
    board.forEach((v,i)=>{if(!v){board[i]='O';const s=minimax(board,false,0,-Infinity,Infinity);board[i]=null;if(s>best){best=s;pick=i;}}});
    return pick;
  }

  newGame();
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
