<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:480px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;align-self:flex-start}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem;align-self:flex-start}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:3rem;line-height:1.6;align-self:flex-start}
    .coin{width:160px;height:160px;border-radius:50%;background:linear-gradient(145deg,#f5d060,#c8a000);border:5px solid #b08800;display:flex;align-items:center;justify-content:center;font-size:4rem;cursor:pointer;transition:transform .1s;box-shadow:0 10px 30px rgba(0,0,0,.15),inset 0 3px 6px rgba(255,255,255,.3);user-select:none;margin-bottom:2rem}
    .coin:hover{transform:scale(1.04)}
    .coin.flipping{animation:flip .65s ease-in-out}
    @keyframes flip{0%{transform:rotateY(0)}25%{transform:rotateY(90deg) scale(.9)}50%{transform:rotateY(180deg)}75%{transform:rotateY(270deg) scale(.9)}100%{transform:rotateY(360deg)}}
    .result{font-family:'DM Serif Display',serif;font-size:2.5rem;letter-spacing:-.02em;min-height:3.2rem;margin-bottom:.5rem;text-align:center}
    .tally{font-size:.88rem;color:var(--muted);margin-bottom:2.5rem;text-align:center}
    .flip-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:1rem 3rem;font-family:'DM Serif Display',serif;font-size:1.2rem;cursor:pointer;transition:opacity .2s;margin-bottom:.75rem;width:100%}
    .flip-btn:hover{opacity:.8}
    .reset-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:.6rem 1.5rem;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--muted);cursor:pointer;transition:all .2s}
    .reset-btn:hover{border-color:var(--ink);color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding:2.5rem 1.5rem 4rem}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🪙 Fun</p>
  <h1>Coin Flip</h1>
  <p class="subtitle">Click the coin or press Space to flip. Tracks your heads and tails count.</p>
  <div class="coin" id="coin" onclick="doFlip()">🪙</div>
  <div class="result" id="result"></div>
  <div class="tally" id="tally">Heads: 0 &nbsp;·&nbsp; Tails: 0</div>
  <button class="flip-btn" onclick="doFlip()">Flip Coin</button>
  <button class="reset-btn" onclick="doReset()">Reset</button>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let h=0,t=0,going=false;
  function doFlip(){
    if(going)return;going=true;
    const c=document.getElementById('coin');
    c.classList.add('flipping');
    setTimeout(()=>{
      const heads=Math.random()<.5;
      if(heads)h++;else t++;
      c.textContent=heads?'👑':'🌊';
      document.getElementById('result').textContent=heads?'Heads!':'Tails!';
      document.getElementById('tally').textContent='Heads: '+h+' · Tails: '+t;
      c.classList.remove('flipping');going=false;
    },680);
  }
  function doReset(){h=0;t=0;document.getElementById('coin').textContent='🪙';document.getElementById('result').textContent='';document.getElementById('tally').textContent='Heads: 0 · Tails: 0';}
  document.addEventListener('keydown',e=>{if(e.key===' '&&e.target===document.body){e.preventDefault();doFlip();}});
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
