<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Speed Test — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff;--green:#1a7a4a;--red:#b03030}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:800px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    /* Stats bar */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.2rem}
    .stat{background:var(--card);padding:1rem;text-align:center}
    .stat-val{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-.02em}
    .stat-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}
    /* Timer controls */
    .controls-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .ctrl-label{font-size:.82rem;color:var(--muted)}
    .time-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:99px;padding:.3rem .85rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .time-btn:hover{border-color:var(--ink);color:var(--ink)}
    .time-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    /* Progress bar */
    .progress-wrap{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1.2rem}
    .progress-fill{height:100%;background:var(--ink);border-radius:99px;transition:width .5s linear;width:0%}
    /* Passage display */
    .passage-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.6rem;margin-bottom:1rem;font-size:1.1rem;line-height:1.9;letter-spacing:.01em;position:relative;cursor:text}
    .char{transition:color .05s}
    .char.correct{color:var(--green)}
    .char.wrong{color:var(--red);text-decoration:underline}
    .char.current{background:var(--ink);color:#fff;border-radius:2px}
    /* Input overlay */
    #hiddenInput{position:absolute;opacity:0;width:1px;height:1px;top:0;left:0;pointer-events:none}
    /* Result */
    .result-card{background:var(--ink);color:#fff;border-radius:10px;padding:2rem;text-align:center;margin-bottom:1rem;display:none}
    .result-wpm{font-family:'DM Serif Display',serif;font-size:5rem;letter-spacing:-.03em;line-height:1}
    .result-label{font-size:.82rem;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;margin-top:.4rem}
    .result-details{display:flex;gap:2rem;justify-content:center;margin-top:1.2rem;font-size:.9rem;color:rgba(255,255,255,.7)}
    .restart-btn{background:transparent;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:.65rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;margin-top:1.2rem}
    .restart-btn:hover{background:rgba(255,255,255,.15)}
    .start-hint{text-align:center;font-size:.85rem;color:var(--muted);padding:.75rem}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.stats-bar{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">⌨️ Fun</p>
  <h1>Typing Speed Test</h1>
  <p class="subtitle">Measure your WPM and accuracy. Click the text and start typing.</p>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="wpmVal">—</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="accVal">—</div><div class="stat-label">Accuracy</div></div>
    <div class="stat"><div class="stat-val" id="timeVal">—</div><div class="stat-label">Time left</div></div>
    <div class="stat"><div class="stat-val" id="errVal">0</div><div class="stat-label">Errors</div></div>
  </div>

  <div class="controls-row">
    <span class="ctrl-label">Duration</span>
    <button class="time-btn" data-t="15">15s</button>
    <button class="time-btn active" data-t="30">30s</button>
    <button class="time-btn" data-t="60">60s</button>
    <button class="time-btn" data-t="120">120s</button>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <div class="passage-card" id="passageCard" onclick="focusInput()">
    <div id="passageDisplay"></div>
    <input id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <p class="start-hint" id="startHint">Click here and start typing to begin the test</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-wpm" id="resultWpm">0</div>
    <div class="result-label">Words per minute</div>
    <div class="result-details">
      <span>Accuracy: <strong id="rAcc">—</strong></span>
      <span>Errors: <strong id="rErr">—</strong></span>
      <span>Correct words: <strong id="rWords">—</strong></span>
    </div>
    <button class="restart-btn" onclick="restart()">↩ Try again</button>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  const PASSAGES = [
    "The quick brown fox jumps over the lazy dog near the riverbank while the sun sets slowly behind the distant mountains casting long shadows across the golden fields.",
    "Programming is the art of telling another human what one wants the computer to do. Every line of code tells a story and solves a problem waiting to be discovered.",
    "A journey of a thousand miles begins with a single step. The path forward is rarely straight but those who persist through every obstacle find themselves stronger for it.",
    "Science is not only compatible with spirituality it is a profound source of spirituality. When we recognize our place in an immensity of light years and in the passage of ages.",
    "The best way to predict the future is to invent it. Innovation distinguishes between a leader and a follower and great ideas often come from the most unexpected places.",
    "Reading gives us somewhere to go when we have to stay where we are. Books open worlds previously unimagined and transform the way we think feel and understand our lives.",
    "Success is not final failure is not fatal it is the courage to continue that counts. Every setback is a setup for a comeback and resilience is the foundation of achievement.",
  ];

  let duration=30, timer=null, started=false, finished=false;
  let pos=0, errors=0, correct=0, startTime=0, remaining=0;
  let passage='';

  document.querySelectorAll('.time-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.time-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');duration=parseInt(b.dataset.t);restart();
  }));

  function loadPassage(){
    passage=PASSAGES[Math.floor(Math.random()*PASSAGES.length)];
    const display=document.getElementById('passageDisplay');
    display.innerHTML=passage.split('').map((c,i)=>`<span class="char${i===0?' current':''}" data-i="${i}">${c}</span>`).join('');
  }

  function focusInput(){
    document.getElementById('hiddenInput').focus();
  }

  document.getElementById('hiddenInput').addEventListener('keydown',e=>{
    if(finished)return;
    if(e.key==='Backspace'){e.preventDefault();return;}
    if(e.key.length!==1)return;
    e.preventDefault();
    if(!started){
      started=true;startTime=Date.now();remaining=duration;
      document.getElementById('startHint').style.display='none';
      document.getElementById('timeVal').textContent=duration;
      timer=setInterval(tick,200);
    }
    const ch=passage[pos];
    const span=document.querySelector(`.char[data-i="${pos}"]`);
    if(span){span.classList.remove('current');}
    if(e.key===ch){
      if(span)span.classList.add('correct');
      correct++;
    } else {
      if(span)span.classList.add('wrong');
      errors++;
    }
    pos++;
    const next=document.querySelector(`.char[data-i="${pos}"]`);
    if(next)next.classList.add('current');
    updateStats();
    if(pos>=passage.length)endTest();
  });

  function tick(){
    const elapsed=(Date.now()-startTime)/1000;
    remaining=Math.max(0,duration-elapsed);
    document.getElementById('timeVal').textContent=Math.ceil(remaining);
    document.getElementById('progressFill').style.width=((duration-remaining)/duration*100)+'%';
    const wpm=Math.round((correct/5)/(elapsed/60));
    document.getElementById('wpmVal').textContent=isFinite(wpm)?wpm:'—';
    if(remaining<=0)endTest();
  }

  function updateStats(){
    const elapsed=started?(Date.now()-startTime)/1000:0;
    const wpm=elapsed>0?Math.round((correct/5)/(elapsed/60)):0;
    document.getElementById('wpmVal').textContent=wpm||'—';
    document.getElementById('accVal').textContent=pos>0?Math.round(correct/pos*100)+'%':'—';
    document.getElementById('errVal').textContent=errors;
  }

  function endTest(){
    if(finished)return;
    finished=true;clearInterval(timer);
    const elapsed=(Date.now()-startTime)/1000;
    const wpm=Math.round((correct/5)/(elapsed/60));
    const acc=pos>0?Math.round(correct/pos*100):0;
    const words=Math.floor(correct/5);
    document.getElementById('passageCard').style.display='none';
    const rc=document.getElementById('resultCard');rc.style.display='block';
    document.getElementById('resultWpm').textContent=wpm;
    document.getElementById('rAcc').textContent=acc+'%';
    document.getElementById('rErr').textContent=errors;
    document.getElementById('rWords').textContent=words;
  }

  function restart(){
    clearInterval(timer);
    started=false;finished=false;pos=0;errors=0;correct=0;startTime=0;remaining=duration;
    document.getElementById('wpmVal').textContent='—';
    document.getElementById('accVal').textContent='—';
    document.getElementById('timeVal').textContent='—';
    document.getElementById('errVal').textContent='0';
    document.getElementById('progressFill').style.width='0%';
    document.getElementById('passageCard').style.display='block';
    document.getElementById('resultCard').style.display='none';
    document.getElementById('startHint').style.display='block';
    loadPassage();
  }

  loadPassage();
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
