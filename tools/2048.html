<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:2rem 4rem 4rem;max-width:520px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.25rem;text-align:center}
    .hud{display:flex;gap:1rem;margin-bottom:1rem;width:100%}
    .hud-box{background:var(--ink);color:#fff;border-radius:8px;padding:.6rem 1rem;text-align:center;flex:1}
    .hud-box.score{flex:2}
    .hud-val{font-family:'DM Serif Display',serif;font-size:1.8rem;letter-spacing:-.02em}
    .hud-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
    /* Grid */
    .grid-wrap{background:#c8b99a;border-radius:10px;padding:8px;width:100%;aspect-ratio:1;margin-bottom:1rem;position:relative}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;height:100%}
    .bg-cell{background:#d9cbb0;border-radius:6px}
    .tiles{position:absolute;inset:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tile{border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-weight:700;transition:all .1s ease;position:absolute}
    /* Tile colors */
    .t2{background:#eee4da;color:#776e65}.t4{background:#ede0c8;color:#776e65}
    .t8{background:#f2b179;color:#fff}.t16{background:#f59563;color:#fff}
    .t32{background:#f67c5f;color:#fff}.t64{background:#f65e3b;color:#fff}
    .t128{background:#edcf72;color:#fff;font-size:clamp(.9rem,3vw,1.4rem)}
    .t256{background:#edcc61;color:#fff;font-size:clamp(.9rem,3vw,1.4rem)}
    .t512{background:#edc850;color:#fff;font-size:clamp(.9rem,3vw,1.4rem)}
    .t1024{background:#edc53f;color:#fff;font-size:clamp(.7rem,2.5vw,1.1rem)}
    .t2048{background:#edc22e;color:#fff;font-size:clamp(.7rem,2.5vw,1.1rem)}
    .t-high{background:#3c3a32;color:#fff;font-size:clamp(.6rem,2vw,1rem)}
    @keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes merge{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
    .new-tile{animation:pop .15s ease}
    .merged-tile{animation:merge .18s ease}
    /* Overlay */
    .overlay{position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;display:none}
    .overlay-title{font-family:'DM Serif Display',serif;font-size:2.5rem;letter-spacing:-.02em}
    .overlay-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.75rem 2rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:opacity .2s}
    .overlay-btn:hover{opacity:.8}
    /* Controls */
    .action-row{display:flex;gap:.5rem;width:100%}
    .new-btn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.85rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:opacity .2s}
    .new-btn:hover{opacity:.8}
    .hint{font-size:.8rem;color:var(--muted);text-align:center;margin-top:.5rem}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:600px){header,main,footer{padding-left:1rem;padding-right:1rem}h1{font-size:2rem}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <h1>2048</h1>
  <div class="hud">
    <div class="hud-box score"><div class="hud-val" id="score">0</div><div class="hud-label">Score</div></div>
    <div class="hud-box"><div class="hud-val" id="best">0</div><div class="hud-label">Best</div></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="bgGrid"></div>
    <div class="tiles" id="tileLayer"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">Game Over</div>
      <button class="overlay-btn" onclick="newGame()">Try again</button>
    </div>
  </div>

  <div class="action-row">
    <button class="new-btn" onclick="newGame()">New Game</button>
  </div>
  <p class="hint">Arrow keys or swipe to move tiles</p>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let grid=[], score=0, best=parseInt(localStorage.getItem('2048-best')||'0'), won=false;

  // Build bg cells
  const bg=document.getElementById('bgGrid');
  for(let i=0;i<16;i++){const d=document.createElement('div');d.className='bg-cell';bg.appendChild(d);}
  document.getElementById('best').textContent=best;

  function newGame(){
    grid=Array.from({length:4},()=>Array(4).fill(0));
    score=0;won=false;
    document.getElementById('score').textContent=0;
    document.getElementById('overlay').style.display='none';
    addTile();addTile();render();
  }

  function addTile(){
    const empty=[];
    grid.forEach((row,r)=>row.forEach((v,c)=>{if(!v)empty.push([r,c]);}));
    if(!empty.length)return false;
    const[r,c]=empty[Math.floor(Math.random()*empty.length)];
    grid[r][c]=Math.random()<0.9?2:4;
    return true;
  }

  function render(newPos=null,mergedPos=null){
    const layer=document.getElementById('tileLayer');
    layer.innerHTML='';
    const sz=(layer.offsetWidth-8*3)/4;
    grid.forEach((row,r)=>row.forEach((v,c)=>{
      if(!v)return;
      const div=document.createElement('div');
      div.className='tile '+tileClass(v);
      if(newPos&&newPos.some(([pr,pc])=>pr===r&&pc===c))div.classList.add('new-tile');
      if(mergedPos&&mergedPos.some(([pr,pc])=>pr===r&&pc===c))div.classList.add('merged-tile');
      div.textContent=v;
      const left=c*(sz+8),top=r*(sz+8);
      div.style.cssText=`width:${sz}px;height:${sz}px;left:${left}px;top:${top}px;font-size:clamp(.8rem,${sz/3}px,1.6rem)`;
      layer.appendChild(div);
    }));
  }

  function tileClass(v){
    if(v<=2048)return 't'+v;return 't-high';
  }

  function slide(row){
    let arr=row.filter(v=>v);
    const merged=[];
    for(let i=0;i<arr.length-1;i++){
      if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];arr[i+1]=0;merged.push(i);}
    }
    arr=arr.filter(v=>v);
    while(arr.length<4)arr.push(0);
    return{row:arr,merged};
  }

  function move(dir){
    let changed=false;
    const newPos=[],mergedPos=[];
    const g=grid.map(r=>[...r]);

    if(dir==='left'||dir==='right'){
      grid.forEach((row,r)=>{
        const rev=dir==='right';
        const input=rev?[...row].reverse():row;
        const{row:out}=slide(input);
        const final=rev?[...out].reverse():out;
        final.forEach((v,c)=>{if(v&&v!==g[r][c]){changed=true;}if(v&&!g[r][c])newPos.push([r,c]);if(v>g[r][c]&&g[r][c])mergedPos.push([r,c]);});
        grid[r]=final;
      });
    } else {
      for(let c=0;c<4;c++){
        const col=grid.map(r=>r[c]);
        const rev=dir==='down';
        const input=rev?[...col].reverse():col;
        const{row:out}=slide(input);
        const final=rev?[...out].reverse():out;
        final.forEach((v,r)=>{if(v&&v!==g[r][c]){changed=true;}if(v&&!g[r][c])newPos.push([r,c]);if(v>g[r][c]&&g[r][c])mergedPos.push([r,c]);});
        final.forEach((v,r)=>grid[r][c]=v);
      }
    }

    if(!changed)return;
    document.getElementById('score').textContent=score;
    if(score>best){best=score;localStorage.setItem('2048-best',best);document.getElementById('best').textContent=best;}
    addTile();render(newPos,mergedPos);

    // Win check
    if(!won&&grid.some(r=>r.includes(2048))){
      won=true;
      document.getElementById('overlayTitle').textContent='You reached 2048! 🎉';
      document.getElementById('overlay').style.display='flex';
    } else if(!canMove()){
      document.getElementById('overlayTitle').textContent='Game Over';
      document.getElementById('overlay').style.display='flex';
    }
  }

  function canMove(){
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      if(!grid[r][c])return true;
      if(c<3&&grid[r][c]===grid[r][c+1])return true;
      if(r<3&&grid[r][c]===grid[r+1][c])return true;
    }return false;
  }

  // Keyboard
  document.addEventListener('keydown',e=>{
    const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if(map[e.key]){e.preventDefault();move(map[e.key]);}
  });

  // Touch swipe
  let tx=0,ty=0;
  document.getElementById('tileLayer').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.getElementById('tileLayer').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
    if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');
  });

  newGame();
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
