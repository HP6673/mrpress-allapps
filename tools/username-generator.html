<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Username Generator — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:720px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    .opt-group{display:flex;flex-direction:column;gap:.4rem}
    .opt-group label{font-size:.8rem;color:var(--muted)}
    .btn-group{display:flex;gap:.4rem;flex-wrap:wrap}
    .opt-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .opt-btn:hover{border-color:var(--ink);color:var(--ink)}
    .opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .toggle-row{display:flex;align-items:center;gap:.5rem;font-size:.85rem;cursor:pointer;margin-top:.25rem}
    .toggle-row input{accent-color:var(--ink);cursor:pointer;width:15px;height:15px}
    input[type="text"]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s}
    input[type="text"]:focus{border-color:var(--ink)}
    input[type="text"]::placeholder{color:var(--muted)}
    .results-grid{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
    .result-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;transition:border-color .2s}
    .result-item:hover{border-color:var(--muted)}
    .result-name{font-family:'DM Sans',monospace;font-size:.95rem;font-weight:500;letter-spacing:.02em}
    .copy-mini{background:transparent;border:1px solid var(--border);border-radius:5px;padding:.2rem .65rem;font-family:'DM Sans',sans-serif;font-size:.72rem;color:var(--muted);cursor:pointer;transition:all .2s;flex-shrink:0}
    .copy-mini:hover{border-color:var(--ink);color:var(--ink)}
    .gen-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:1rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s;margin-bottom:1rem}
    .gen-btn:hover{opacity:.8}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.opts-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">👤 Utility</p>
  <h1>Username Generator</h1>
  <p class="subtitle">Generate unique, creative usernames. Use a keyword, pick a style, and get a batch instantly.</p>

  <div class="card">
    <p class="card-title">Options</p>
    <div class="opts-grid">
      <div class="opt-group">
        <label>Style</label>
        <div class="btn-group" id="styleGroup">
          <button class="opt-btn active" data-style="mixed">Mixed</button>
          <button class="opt-btn" data-style="adjnoun">Adj + Noun</button>
          <button class="opt-btn" data-style="cool">Cool</button>
          <button class="opt-btn" data-style="gamer">Gamer</button>
          <button class="opt-btn" data-style="pro">Professional</button>
        </div>
      </div>
      <div class="opt-group">
        <label>Numbers</label>
        <div class="btn-group" id="numGroup">
          <button class="opt-btn active" data-num="none">None</button>
          <button class="opt-btn" data-num="end">Add at end</button>
          <button class="opt-btn" data-num="year">Year suffix</button>
        </div>
      </div>
      <div class="opt-group">
        <label>Keyword (optional)</label>
        <input type="text" id="keyword" placeholder="e.g. fire, star, wolf…" />
      </div>
      <div class="opt-group">
        <label>Count</label>
        <div class="btn-group" id="countGroup">
          <button class="opt-btn" data-count="5">5</button>
          <button class="opt-btn active" data-count="10">10</button>
          <button class="opt-btn" data-count="20">20</button>
        </div>
      </div>
    </div>
    <label class="toggle-row"><input type="checkbox" id="underscore" /> Use underscores instead of spaces</label>
    <label class="toggle-row" style="margin-top:.4rem"><input type="checkbox" id="lowercase" checked /> Lowercase only</label>
  </div>

  <button class="gen-btn" onclick="generate()">⚡ Generate Usernames</button>

  <div class="results-grid" id="results"></div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  const ADJ = ['swift','dark','bright','cold','wild','bold','iron','steel','neon','silver','golden','silent','shadow','ghost','storm','frost','flame','crystal','acid','cosmic','atomic','lunar','solar','venom','azure','crimson','jade','obsidian','phantom','cyber','turbo','hyper','ultra','mega','omega','alpha','delta','nova','apex','void'];
  const NOUNS = ['wolf','hawk','blade','fox','bear','shark','raven','tiger','eagle','viper','dragon','phoenix','lynx','cobra','panther','falcon','rider','hunter','knight','ranger','scout','striker','cipher','void','pulse','flux','byte','pixel','node','grid','wave','core','edge','drift','echo','apex','nexus','zenith','orbit','forge'];
  const COOL = ['xr','zx','vx','kr','nx','px','qr','zk','vk','rx'];
  const GAMER_PREFIX = ['pro','gg','xxx','the','real','og','big','lil','mr','dr','ultra','mega','hyper','turbo','dark','shadow','ghost','neon'];
  const GAMER_SUFFIX = ['gg','tv','aim','fps','pvp','360','420','420','99','xd','op','ez','rng','rdm'];
  const PRO_PREFIX = ['dev','tech','code','data','design','brand','mark','biz','corp','pro','exec','lead','chief','head'];
  const PRO_SUFFIX = ['hub','lab','co','works','group','team','hq','io','ai','pro'];

  let style='mixed', numMode='none', count=10;

  document.getElementById('styleGroup').addEventListener('click',e=>{const b=e.target.closest('.opt-btn');if(!b)return;document.querySelectorAll('#styleGroup .opt-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');style=b.dataset.style;});
  document.getElementById('numGroup').addEventListener('click',e=>{const b=e.target.closest('.opt-btn');if(!b)return;document.querySelectorAll('#numGroup .opt-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');numMode=b.dataset.num;});
  document.getElementById('countGroup').addEventListener('click',e=>{const b=e.target.closest('.opt-btn');if(!b)return;document.querySelectorAll('#countGroup .opt-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');count=parseInt(b.dataset.count);});

  function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
  function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

  function makeName(keyword) {
    let name = '';
    const kw = (keyword||'').toLowerCase().trim();
    const eff = style==='mixed' ? ['adjnoun','cool','gamer','pro'][randInt(0,3)] : style;

    if (eff==='adjnoun') {
      name = kw ? (Math.random()>0.5 ? rand(ADJ)+kw : kw+rand(NOUNS)) : rand(ADJ)+rand(NOUNS);
    } else if (eff==='cool') {
      name = kw ? kw+rand(COOL)+randInt(1,99) : rand(ADJ)+rand(COOL);
    } else if (eff==='gamer') {
      name = kw ? rand(GAMER_PREFIX)+(kw||rand(NOUNS))+rand(GAMER_SUFFIX) : rand(GAMER_PREFIX)+rand(NOUNS)+rand(GAMER_SUFFIX);
    } else {
      name = kw ? rand(PRO_PREFIX)+kw : rand(PRO_PREFIX)+rand(NOUNS)+rand(PRO_SUFFIX);
    }

    // Number suffix
    if (numMode==='end') name += randInt(1,999);
    else if (numMode==='year') name += [1990,1995,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2024][randInt(0,13)];

    // Separator
    const sep = document.getElementById('underscore').checked ? '_' : '';
    name = name.replace(/([a-z])([A-Z])/g,'$1_$2').replace(/\s+/g,sep||'');
    if (!sep) name = name.replace(/_/g,'');

    // Case
    return document.getElementById('lowercase').checked ? name.toLowerCase() : name;
  }

  function generate() {
    const kw = document.getElementById('keyword').value;
    const results = document.getElementById('results');
    const names = new Set();
    let attempts = 0;
    while (names.size < count && attempts < count*10) { names.add(makeName(kw)); attempts++; }
    results.innerHTML = '';
    [...names].forEach(name => {
      const div = document.createElement('div'); div.className='result-item';
      div.innerHTML = `<span class="result-name">${name}</span><button class="copy-mini" onclick="copyName(this,'${name}')">Copy</button>`;
      results.appendChild(div);
    });
  }

  function copyName(btn, name) {
    navigator.clipboard.writeText(name).then(()=>{ btn.textContent='✓'; setTimeout(()=>btn.textContent='Copy',1200); });
  }

  generate();
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
