<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Tools — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:760px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .mode-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2rem}
    .mode-tab{background:var(--card);padding:.9rem .5rem;text-align:center;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;color:var(--muted);transition:background .15s;line-height:1.3}
    .mode-tab .tab-icon{font-size:1.2rem;display:block;margin-bottom:.2rem}
    .mode-tab.active{background:var(--ink);color:#fff}
    .section{display:none}.section.visible{display:block}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}

    /* ── COIN ── */
    .coin-stage{display:flex;flex-direction:column;align-items:center;padding:2rem 0}
    .coin{width:140px;height:140px;border-radius:50%;background:linear-gradient(145deg,#f5d060,#c8a000);border:4px solid #b08800;display:flex;align-items:center;justify-content:center;font-size:3.5rem;cursor:pointer;transition:transform .1s;box-shadow:0 8px 24px rgba(0,0,0,.15),inset 0 2px 4px rgba(255,255,255,.3);user-select:none;margin-bottom:1.5rem}
    .coin:hover{transform:scale(1.04)}
    .coin.flipping{animation:coinFlip .6s ease-in-out}
    @keyframes coinFlip{0%{transform:rotateY(0)}25%{transform:rotateY(90deg) scale(0.9)}50%{transform:rotateY(180deg)}75%{transform:rotateY(270deg) scale(0.9)}100%{transform:rotateY(360deg)}}
    .coin-result{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-.02em;margin-bottom:.5rem;min-height:2.5rem}
    .coin-stats{font-size:.82rem;color:var(--muted)}
    .flip-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.9rem 2.5rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s;margin-top:1rem}
    .flip-btn:hover{opacity:.8}

    /* ── DICE ── */
    .dice-stage{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0}
    .dice-count-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
    .dice-count-row label{font-size:.85rem;color:var(--muted)}
    .qty-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;width:32px;height:32px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .qty-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
    .qty-val{font-weight:500;min-width:24px;text-align:center;font-size:1rem}
    .dice-type-row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem}
    .dice-type-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .dice-type-btn:hover{border-color:var(--ink);color:var(--ink)}
    .dice-type-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .dice-grid{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem;min-height:80px;align-items:center}
    .die{width:72px;height:72px;background:var(--card);border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.8rem;font-weight:500;box-shadow:0 3px 10px rgba(0,0,0,.1);transition:transform .15s}
    .die.rolling{animation:dieRoll .4s ease-out}
    @keyframes dieRoll{0%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(10deg) scale(0.95)}100%{transform:rotate(0) scale(1)}}
    .dice-total{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--muted);margin-bottom:.5rem}
    .dice-total span{color:var(--ink);font-size:2rem}
    .roll-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.9rem 2.5rem;font-family:'DM Serif Display',serif;font-size:1.1rem;cursor:pointer;transition:opacity .2s}
    .roll-btn:hover{opacity:.8}

    /* ── WHEEL ── */
    .wheel-layout{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:start}
    .wheel-canvas-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem}
    canvas#wheelCanvas{border-radius:50%;display:block}
    .spin-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.75rem 2rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:opacity .2s;width:100%}
    .spin-btn:hover{opacity:.8}
    .spin-btn:disabled{opacity:.35;cursor:not-allowed}
    .wheel-names-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem}
    .wheel-names-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem;max-height:260px;overflow-y:auto}
    .name-row{display:flex;gap:.4rem}
    .name-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:.45rem .7rem;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none}
    .name-input:focus{border-color:var(--ink)}
    .name-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0 .25rem;transition:color .15s}
    .name-del:hover{color:#e24b4a}
    .add-name-btn{background:transparent;border:1px dashed var(--border);border-radius:5px;width:100%;padding:.45rem;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:.75rem}
    .add-name-btn:hover{border-color:var(--ink);color:var(--ink)}
    .winner-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center;font-size:.88rem;color:var(--muted);min-height:44px;display:flex;align-items:center;justify-content:center}
    .winner-box.active{background:var(--ink);color:#fff;font-family:'DM Serif Display',serif;font-size:1.1rem}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.wheel-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🎲 Fun</p>
  <h1>Random Tools</h1>
  <p class="subtitle">Flip a coin, roll dice, or spin a name wheel — three tools in one.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('coin')"><span class="tab-icon">🪙</span>Coin Flip</button>
    <button class="mode-tab" onclick="setMode('dice')"><span class="tab-icon">🎲</span>Dice Roller</button>
    <button class="mode-tab" onclick="setMode('wheel')"><span class="tab-icon">🎡</span>Name Wheel</button>
  </div>

  <!-- COIN -->
  <div class="section visible" id="secCoin">
    <div class="card">
      <div class="coin-stage">
        <div class="coin" id="coin" onclick="flipCoin()">🪙</div>
        <div class="coin-result" id="coinResult"></div>
        <div class="coin-stats" id="coinStats">Heads: 0 &nbsp;·&nbsp; Tails: 0</div>
        <button class="flip-btn" onclick="flipCoin()">Flip Coin</button>
      </div>
    </div>
  </div>

  <!-- DICE -->
  <div class="section" id="secDice">
    <div class="card">
      <div class="dice-stage">
        <div class="dice-count-row">
          <label>Number of dice</label>
          <button class="qty-btn" onclick="changeDiceCount(-1)">−</button>
          <span class="qty-val" id="diceCount">2</span>
          <button class="qty-btn" onclick="changeDiceCount(1)">+</button>
        </div>
        <div class="dice-type-row" id="diceTypeRow">
          <button class="dice-type-btn active" data-sides="6">D6</button>
          <button class="dice-type-btn" data-sides="4">D4</button>
          <button class="dice-type-btn" data-sides="8">D8</button>
          <button class="dice-type-btn" data-sides="10">D10</button>
          <button class="dice-type-btn" data-sides="12">D12</button>
          <button class="dice-type-btn" data-sides="20">D20</button>
          <button class="dice-type-btn" data-sides="100">D100</button>
        </div>
        <div class="dice-grid" id="diceGrid"></div>
        <div class="dice-total" id="diceTotal"></div>
        <button class="roll-btn" onclick="rollDice()">🎲 Roll</button>
      </div>
    </div>
  </div>

  <!-- WHEEL -->
  <div class="section" id="secWheel">
    <div class="wheel-layout">
      <div class="wheel-canvas-wrap">
        <canvas id="wheelCanvas" width="280" height="280"></canvas>
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎡 Spin</button>
        <div class="winner-box" id="winnerBox">Winner will appear here</div>
      </div>
      <div class="wheel-names-card">
        <p class="card-title">Names</p>
        <div class="wheel-names-list" id="namesList"></div>
        <button class="add-name-btn" onclick="addName()">+ Add name</button>
      </div>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  // ── Mode ──
  function setMode(m){
    ['coin','dice','wheel'].forEach(s=>{
      document.getElementById('sec'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('visible',s===m);
    });
    document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['coin','dice','wheel'][i]===m));
    if(m==='wheel')drawWheel();
  }

  // ══ COIN ══════════════════════════════════════════════════
  let heads=0,tails=0,flipping=false;
  function flipCoin(){
    if(flipping)return;
    flipping=true;
    const coin=document.getElementById('coin');
    coin.classList.add('flipping');
    setTimeout(()=>{
      const isHeads=Math.random()<0.5;
      if(isHeads)heads++;else tails++;
      coin.textContent=isHeads?'👑':'🌊';
      document.getElementById('coinResult').textContent=isHeads?'Heads!':'Tails!';
      document.getElementById('coinStats').textContent=`Heads: ${heads} · Tails: ${tails}`;
      coin.classList.remove('flipping');
      flipping=false;
    },650);
  }

  // ══ DICE ══════════════════════════════════════════════════
  let diceQty=2,diceSides=6,rolling=false;
  document.getElementById('diceTypeRow').addEventListener('click',e=>{
    const b=e.target.closest('.dice-type-btn');if(!b)return;
    document.querySelectorAll('.dice-type-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');diceSides=parseInt(b.dataset.sides);
    document.getElementById('diceTotal').textContent='';
    renderDiceGrid([]);
  });

  function changeDiceCount(d){diceQty=Math.max(1,Math.min(12,diceQty+d));document.getElementById('diceCount').textContent=diceQty;renderDiceGrid([]);}

  function renderDiceGrid(vals){
    const grid=document.getElementById('diceGrid');
    grid.innerHTML='';
    for(let i=0;i<diceQty;i++){
      const d=document.createElement('div');d.className='die';
      d.textContent=vals[i]||'';
      if(vals[i])d.classList.add('rolling');
      grid.appendChild(d);
    }
  }

  function rollDice(){
    if(rolling)return;rolling=true;
    const vals=Array.from({length:diceQty},()=>Math.floor(Math.random()*diceSides)+1);
    // Show rolling animation then result
    renderDiceGrid(Array(diceQty).fill('?'));
    setTimeout(()=>{
      renderDiceGrid(vals);
      const total=vals.reduce((a,b)=>a+b,0);
      document.getElementById('diceTotal').innerHTML=`Total: <span>${total}</span>`;
      rolling=false;
    },420);
  }

  renderDiceGrid([]);

  // ══ WHEEL ══════════════════════════════════════════════════
  let names=['Alice','Bob','Carol','David','Eve','Frank'];
  const WHEEL_COLORS=['#378add','#1d9e75','#f59e0b','#e24b4a','#534ab7','#d85a30','#0f6e56','#993556','#639922','#ba7517'];
  let spinning=false, angle=0;

  function renderNamesList(){
    const list=document.getElementById('namesList');
    list.innerHTML='';
    names.forEach((n,i)=>{
      const row=document.createElement('div');row.className='name-row';
      row.innerHTML=`<input class="name-input" value="${n}" oninput="names[${i}]=this.value;drawWheel()" /><button class="name-del" onclick="removeName(${i})">✕</button>`;
      list.appendChild(row);
    });
  }

  function addName(){names.push('Name '+(names.length+1));renderNamesList();drawWheel();}
  function removeName(i){if(names.length>2){names.splice(i,1);renderNamesList();drawWheel();}}

  function drawWheel(highlightIdx=-1){
    const canvas=document.getElementById('wheelCanvas');
    const ctx=canvas.getContext('2d');
    const cx=canvas.width/2,cy=canvas.height/2,r=cx-8;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const n=names.filter(x=>x.trim()).length||1;
    const slice=(2*Math.PI)/n;
    names.filter(x=>x.trim()).forEach((name,i)=>{
      const start=angle+i*slice-Math.PI/2;
      const end=start+slice;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
      ctx.fillStyle=WHEEL_COLORS[i%WHEEL_COLORS.length];
      ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      // Label
      ctx.save();ctx.translate(cx,cy);ctx.rotate(start+slice/2);
      ctx.textAlign='right';ctx.fillStyle='#fff';
      ctx.font=`500 ${Math.min(14,200/n)}px 'DM Sans',sans-serif`;
      ctx.fillText(name.length>12?name.slice(0,12)+'…':name, r-10, 4);
      ctx.restore();
    });
    // Center dot + pointer
    ctx.beginPath();ctx.arc(cx,cy,14,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.stroke();
    // Pointer arrow at top
    ctx.beginPath();ctx.moveTo(cx-10,4);ctx.lineTo(cx+10,4);ctx.lineTo(cx,22);ctx.closePath();
    ctx.fillStyle='#111';ctx.fill();
  }

  function spinWheel(){
    if(spinning||names.filter(x=>x.trim()).length<2)return;
    spinning=true;
    document.getElementById('spinBtn').disabled=true;
    document.getElementById('winnerBox').className='winner-box';
    document.getElementById('winnerBox').textContent='Spinning…';
    const validNames=names.filter(x=>x.trim());
    const n=validNames.length;
    const targetIdx=Math.floor(Math.random()*n);
    const targetAngle=-(targetIdx/n*2*Math.PI)-(Math.PI*2*(5+Math.random()*3));
    const startAngle=angle;
    const duration=4000;
    const start=performance.now();
    function frame(now){
      const t=Math.min(1,(now-start)/duration);
      const ease=1-Math.pow(1-t,4);
      angle=startAngle+targetAngle*ease;
      drawWheel();
      if(t<1){requestAnimationFrame(frame);}
      else{
        spinning=false;
        document.getElementById('spinBtn').disabled=false;
        // Determine winner: pointer is at top (angle=0 in local space)
        const normalized=(((-angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI));
        const winner=Math.floor(normalized/(2*Math.PI/n))%n;
        document.getElementById('winnerBox').className='winner-box active';
        document.getElementById('winnerBox').textContent='🎉 '+validNames[winner];
      }
    }
    requestAnimationFrame(frame);
  }

  renderNamesList();drawWheel();
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
