<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Picker — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:680px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.6rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    /* Swatch + picker */
    .swatch-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
    .swatch{width:80px;height:80px;border-radius:10px;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;transition:box-shadow .2s}
    .swatch:hover{box-shadow:0 0 0 3px var(--ink)}
    .swatch input[type="color"]{position:absolute;inset:-10px;width:calc(100%+20px);height:calc(100%+20px);opacity:0;cursor:pointer}
    .swatch-info{flex:1}
    .swatch-hex{font-family:'DM Serif Display',serif;font-size:1.8rem;letter-spacing:-.01em;cursor:pointer}
    .swatch-name{font-size:.82rem;color:var(--muted);margin-top:.2rem}
    /* Format outputs */
    .format-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .fmt-group{display:flex;flex-direction:column;gap:.4rem}
    .fmt-group label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .fmt-row{display:flex;gap:.4rem}
    .fmt-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;font-family:'DM Sans',monospace;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s}
    .fmt-input:focus{border-color:var(--ink)}
    .copy-mini{background:transparent;border:1px solid var(--border);border-radius:6px;padding:.6rem .8rem;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
    .copy-mini:hover{border-color:var(--ink);color:var(--ink)}
    /* Sliders */
    .slider-group{display:flex;flex-direction:column;gap:.75rem;margin-bottom:.5rem}
    .slider-row{display:flex;align-items:center;gap:.75rem}
    .slider-row label{font-size:.78rem;color:var(--muted);width:12px;flex-shrink:0}
    input[type="range"]{flex:1;height:6px;border-radius:99px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--ink);cursor:pointer}
    #rSlider{background:linear-gradient(to right,#000,#f00)}
    #gSlider{background:linear-gradient(to right,#000,#0f0)}
    #bSlider{background:linear-gradient(to right,#000,#00f)}
    .slider-val{width:36px;text-align:right;font-size:.85rem;font-weight:500}
    /* Palette */
    .palette-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.25rem}
    .pal-swatch{width:36px;height:36px;border-radius:6px;cursor:pointer;border:1px solid rgba(0,0,0,.1);transition:transform .15s;flex-shrink:0}
    .pal-swatch:hover{transform:scale(1.15)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.format-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🎨 Design</p>
  <h1>Color Picker</h1>
  <p class="subtitle">Pick any color and instantly get HEX, RGB, and HSL values. Copy with one click.</p>

  <div class="card">
    <div class="swatch-row">
      <div class="swatch" id="mainSwatch">
        <input type="color" id="colorPicker" value="#3b82f6" oninput="fromPicker(this.value)" />
      </div>
      <div class="swatch-info">
        <div class="swatch-hex" id="hexDisplay">#3B82F6</div>
        <div class="swatch-name" id="colorName">Click swatch to open picker</div>
      </div>
    </div>
    <!-- RGB sliders -->
    <div class="slider-group">
      <div class="slider-row"><label style="color:#e24b4a">R</label><input type="range" id="rSlider" min="0" max="255" value="59" oninput="fromSliders()"/><span class="slider-val" id="rVal">59</span></div>
      <div class="slider-row"><label style="color:#1d9e75">G</label><input type="range" id="gSlider" min="0" max="255" value="130" oninput="fromSliders()"/><span class="slider-val" id="gVal">130</span></div>
      <div class="slider-row"><label style="color:#378add">B</label><input type="range" id="bSlider" min="0" max="255" value="246" oninput="fromSliders()"/><span class="slider-val" id="bVal">246</span></div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Color values</p>
    <div class="format-grid">
      <div class="fmt-group">
        <label>HEX</label>
        <div class="fmt-row"><input class="fmt-input" id="hexInput" value="#3B82F6" oninput="fromHex(this.value)"/><button class="copy-mini" onclick="copyVal('hexInput')">Copy</button></div>
      </div>
      <div class="fmt-group">
        <label>RGB</label>
        <div class="fmt-row"><input class="fmt-input" id="rgbInput" value="rgb(59, 130, 246)" readonly/><button class="copy-mini" onclick="copyVal('rgbInput')">Copy</button></div>
      </div>
      <div class="fmt-group">
        <label>HSL</label>
        <div class="fmt-row"><input class="fmt-input" id="hslInput" value="hsl(217, 91%, 60%)" readonly/><button class="copy-mini" onclick="copyVal('hslInput')">Copy</button></div>
      </div>
      <div class="fmt-group">
        <label>CSS variable</label>
        <div class="fmt-row"><input class="fmt-input" id="cssInput" value="--color: #3B82F6;" readonly/><button class="copy-mini" onclick="copyVal('cssInput')">Copy</button></div>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Shades & tints</p>
    <div class="palette-row" id="palette"></div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let r=59,g=130,b=246;

  function fromPicker(hex){
    const res=/^#([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if(!res)return;
    r=parseInt(res[1],16);g=parseInt(res[2],16);b=parseInt(res[3],16);
    updateAll();
  }

  function fromSliders(){
    r=parseInt(document.getElementById('rSlider').value);
    g=parseInt(document.getElementById('gSlider').value);
    b=parseInt(document.getElementById('bSlider').value);
    updateAll();
  }

  function fromHex(val){
    val=val.trim();
    if(!/^#([a-f\d]{3}|[a-f\d]{6})$/i.test(val))return;
    const full=val.length===4?'#'+val[1]+val[1]+val[2]+val[2]+val[3]+val[3]:val;
    const res=/^#([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(full);
    if(!res)return;
    r=parseInt(res[1],16);g=parseInt(res[2],16);b=parseInt(res[3],16);
    updateAll(true);
  }

  function toHex(){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();}

  function toHSL(){
    const rr=r/255,gg=g/255,bb=b/255;
    const max=Math.max(rr,gg,bb),min=Math.min(rr,gg,bb);
    let h,s,l=(max+min)/2;
    if(max===min){h=s=0;}else{
      const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
      switch(max){case rr:h=(gg-bb)/d+(gg<bb?6:0);break;case gg:h=(bb-rr)/d+2;break;default:h=(rr-gg)/d+4;}
      h/=6;
    }
    return`hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
  }

  function updateAll(skipHex=false){
    const hex=toHex();
    document.getElementById('mainSwatch').style.background=hex;
    document.getElementById('colorPicker').value=hex;
    document.getElementById('hexDisplay').textContent=hex;
    if(!skipHex)document.getElementById('hexInput').value=hex;
    document.getElementById('rSlider').value=r;document.getElementById('gSlider').value=g;document.getElementById('bSlider').value=b;
    document.getElementById('rVal').textContent=r;document.getElementById('gVal').textContent=g;document.getElementById('bVal').textContent=b;
    document.getElementById('rgbInput').value=`rgb(${r}, ${g}, ${b})`;
    document.getElementById('hslInput').value=toHSL();
    document.getElementById('cssInput').value=`--color: ${hex};`;
    buildPalette(hex);
    // Name approximation
    const names={red:[255,0,0],orange:[255,165,0],yellow:[255,255,0],green:[0,128,0],blue:[0,0,255],purple:[128,0,128],pink:[255,192,203],brown:[165,42,42],black:[0,0,0],white:[255,255,255],gray:[128,128,128],cyan:[0,255,255],magenta:[255,0,255]};
    let best='',bestDist=Infinity;
    for(const[name,[nr,ng,nb]]of Object.entries(names)){const d=Math.hypot(r-nr,g-ng,b-nb);if(d<bestDist){bestDist=d;best=name;}}
    document.getElementById('colorName').textContent='Closest: '+best;
  }

  function buildPalette(hex){
    const pal=document.getElementById('palette');pal.innerHTML='';
    for(let i=9;i>=1;i--){
      const f=i/10;
      const tr=Math.round(r+(255-r)*(1-f));const tg=Math.round(g+(255-g)*(1-f));const tb=Math.round(b+(255-b)*(1-f));
      const sw=document.createElement('div');sw.className='pal-swatch';
      const c='rgb('+tr+','+tg+','+tb+')';
      sw.style.background=c;sw.title=c;
      sw.onclick=()=>{r=tr;g=tg;b=tb;updateAll();};
      pal.appendChild(sw);
    }
    // shades
    for(let i=1;i<=9;i++){
      const f=i/10;
      const tr=Math.round(r*f);const tg=Math.round(g*f);const tb=Math.round(b*f);
      const sw=document.createElement('div');sw.className='pal-swatch';
      const c='rgb('+tr+','+tg+','+tb+')';
      sw.style.background=c;sw.title=c;
      sw.onclick=()=>{r=tr;g=tg;b=tb;updateAll();};
      pal.appendChild(sw);
    }
  }

  function copyVal(id){
    const el=document.getElementById(id);
    navigator.clipboard.writeText(el.value).then(()=>{
      const btn=el.nextElementSibling;btn.textContent='✓';setTimeout(()=>btn.textContent='Copy',1400);
    });
  }

  updateAll();
</script>
<script src="../ad.js"></script>
</body>
</html>
