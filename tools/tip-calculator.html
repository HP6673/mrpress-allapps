<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator — All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f7f6f2; --ink:#111; --muted:#888; --border:#e5e3dc; --card:#fff; --tag:#efefeb; --green:#1a7a4a; --green-bg:#edf7f1; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:1.6rem 4rem; border-bottom:1px solid var(--border); }
    .logo { font-family:'DM Serif Display',serif; font-size:1.3rem; letter-spacing:-.02em; text-decoration:none; color:var(--ink); }
    .logo span { color:var(--muted); }
    .back-link { font-size:.85rem; color:var(--muted); text-decoration:none; transition:color .2s; }
    .back-link:hover { color:var(--ink); }
    main { flex:1; padding:3.5rem 4rem 5rem; max-width:680px; margin:0 auto; width:100%; }
    .eyebrow { font-size:.73rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
    h1 { font-family:'DM Serif Display',serif; font-size:2.8rem; letter-spacing:-.025em; margin-bottom:.5rem; }
    .subtitle { color:var(--muted); font-size:.95rem; margin-bottom:2rem; line-height:1.6; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.6rem; margin-bottom:1rem; }
    .card-title { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
    .input-row { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
    .input-row label { font-size:.85rem; color:var(--muted); }
    .input-wrap { position:relative; }
    .input-prefix { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.95rem; pointer-events:none; }
    input[type="number"], input[type="text"] { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:.65rem 1rem .65rem 2rem; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--ink); outline:none; transition:border-color .2s; }
    input:focus { border-color:var(--ink); }
    input.no-prefix { padding-left:1rem; }
    .tip-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.5rem; margin-bottom:.5rem; }
    .tip-btn { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:.55rem; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; text-align:center; }
    .tip-btn:hover { border-color:var(--ink); color:var(--ink); }
    .tip-btn.active { background:var(--ink); border-color:var(--ink); color:#fff; }
    .custom-tip-wrap { margin-top:.5rem; display:flex; align-items:center; gap:.5rem; }
    .custom-tip-wrap label { font-size:.82rem; color:var(--muted); white-space:nowrap; }
    .results { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1rem; }
    .result-row { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.4rem; border-bottom:1px solid var(--border); }
    .result-row:last-child { border-bottom:none; background:var(--ink); color:#fff; border-radius:0 0 10px 10px; }
    .result-label { font-size:.85rem; color:var(--muted); }
    .result-row:last-child .result-label { color:rgba(255,255,255,.6); }
    .result-value { font-family:'DM Serif Display',serif; font-size:1.4rem; letter-spacing:-.015em; }
    .split-row { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; }
    .split-row label { font-size:.85rem; color:var(--muted); white-space:nowrap; }
    .split-btn { width:32px; height:32px; background:var(--bg); border:1px solid var(--border); border-radius:6px; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink); transition:background .15s; }
    .split-btn:hover { background:var(--border); }
    .split-val { font-weight:500; min-width:24px; text-align:center; }
    footer { border-top:1px solid var(--border); padding:1.5rem 4rem; font-size:.8rem; color:var(--muted); }
    @media(max-width:700px){ header,main,footer{padding-left:1.5rem;padding-right:1.5rem;} main{padding-top:2.5rem;} h1{font-size:2rem;} .tip-grid{grid-template-columns:repeat(3,1fr);} }
  </style>
</head>
<body>
<header>
  <a class="logo" href="../index.html">All Apps <span>by MrPress</span></a>
  <a class="back-link" href="../index.html">← All tools</a>
</header>
<main>
  <p class="eyebrow">🧾 Calculator</p>
  <h1>Tip Calculator</h1>
  <p class="subtitle">Enter your bill, pick a tip percentage, and split between as many people as you need.</p>

  <div class="card">
    <p class="card-title">Bill details</p>
    <div class="input-row">
      <label>Bill amount</label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="bill" placeholder="0.00" min="0" step="0.01" oninput="calc()" />
      </div>
    </div>
    <p class="card-title" style="margin-top:1rem;">Tip percentage</p>
    <div class="tip-grid">
      <button class="tip-btn" data-tip="10">10%</button>
      <button class="tip-btn" data-tip="15">15%</button>
      <button class="tip-btn active" data-tip="18">18%</button>
      <button class="tip-btn" data-tip="20">20%</button>
      <button class="tip-btn" data-tip="25">25%</button>
    </div>
    <div class="custom-tip-wrap">
      <label>Custom %</label>
      <div class="input-wrap" style="flex:1">
        <input type="number" id="customTip" class="no-prefix" placeholder="e.g. 22" min="0" max="100" oninput="selectCustom()" />
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Split between</p>
    <div class="split-row">
      <button class="split-btn" onclick="changeSplit(-1)">−</button>
      <span class="split-val" id="splitVal">1</span>
      <button class="split-btn" onclick="changeSplit(1)">+</button>
      <label>people</label>
    </div>
  </div>

  <div class="results">
    <div class="result-row">
      <span class="result-label">Tip amount</span>
      <span class="result-value" id="tipAmt">$0.00</span>
    </div>
    <div class="result-row">
      <span class="result-label">Total bill</span>
      <span class="result-value" id="totalBill">$0.00</span>
    </div>
    <div class="result-row">
      <span class="result-label">Per person</span>
      <span class="result-value" id="perPerson">$0.00</span>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let tipPct = 18, splitCount = 1;
  document.querySelectorAll('.tip-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tipPct = parseFloat(btn.dataset.tip);
      document.getElementById('customTip').value = '';
      calc();
    });
  });
  function selectCustom() {
    const v = parseFloat(document.getElementById('customTip').value);
    if (!isNaN(v)) {
      tipPct = v;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      calc();
    }
  }
  function changeSplit(d) {
    splitCount = Math.max(1, splitCount + d);
    document.getElementById('splitVal').textContent = splitCount;
    calc();
  }
  function fmt(n) { return '$' + n.toFixed(2); }
  function calc() {
    const bill = parseFloat(document.getElementById('bill').value) || 0;
    const tip  = bill * tipPct / 100;
    const total = bill + tip;
    document.getElementById('tipAmt').textContent   = fmt(tip);
    document.getElementById('totalBill').textContent = fmt(total);
    document.getElementById('perPerson').textContent = fmt(total / splitCount);
  }
  calc();
</script>
<script src="../ad.js"></script>
</body>
</html>
