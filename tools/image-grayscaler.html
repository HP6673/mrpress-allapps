<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Grayscaler — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:900px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .dropzone{border:1.5px dashed var(--border);border-radius:12px;padding:3rem 2rem;text-align:center;background:var(--card);cursor:pointer;transition:border-color .2s,background .2s;position:relative}
    .dropzone:hover,.dropzone.drag-over{border-color:var(--ink);background:#faf9f5}
    .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:2.2rem;display:block;margin-bottom:.75rem}
    .drop-title{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:.3rem}
    .drop-sub{font-size:.85rem;color:var(--muted)}
    .panel{display:none;margin-top:1.5rem}
    .panel.visible{display:block}
    .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .preview-box{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .preview-label{padding:.6rem 1rem;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
    .preview-img-wrap{display:flex;align-items:center;justify-content:center;padding:1rem;min-height:180px;background:repeating-conic-gradient(#ddd 0% 25%,#f0f0f0 0% 50%) 0 0/16px 16px}
    .preview-img-wrap img{max-width:100%;max-height:220px;object-fit:contain;display:block}
    .controls-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    .slider-row{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
    .slider-row label{font-size:.85rem;color:var(--muted);white-space:nowrap;min-width:120px}
    input[type="range"]{flex:1;accent-color:var(--ink)}
    .slider-val{font-weight:500;min-width:40px;text-align:right;font-size:.9rem}
    .mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-bottom:1rem}
    .mode-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.6rem .75rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
    .mode-btn:hover{border-color:var(--ink);color:var(--ink)}
    .mode-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .action-row{display:flex;gap:.75rem}
    .btn{flex:1;padding:.85rem;border-radius:8px;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;transition:all .2s;border:none;text-align:center}
    .btn-primary{background:var(--ink);color:#fff}
    .btn-primary:hover{opacity:.8}
    .btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
    .btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.preview-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">⬛ Image</p>
  <h1>Image Grayscaler</h1>
  <p class="subtitle">Convert any image to grayscale, sepia, or a custom tint. Adjust brightness and contrast too.</p>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*" />
    <span class="drop-icon">📂</span>
    <p class="drop-title">Drop an image here</p>
    <p class="drop-sub">or click to browse</p>
  </div>

  <div class="panel" id="panel">
    <div class="preview-grid">
      <div class="preview-box">
        <div class="preview-label">Original</div>
        <div class="preview-img-wrap"><img id="origImg" src="" alt="Original" /></div>
      </div>
      <div class="preview-box">
        <div class="preview-label">Output</div>
        <div class="preview-img-wrap"><img id="outImg" src="" alt="Output" /></div>
      </div>
    </div>

    <div class="controls-card">
      <p class="card-title">Effect</p>
      <div class="mode-grid" id="modeGrid">
        <button class="mode-btn active" data-mode="grayscale">Grayscale</button>
        <button class="mode-btn" data-mode="sepia">Sepia</button>
        <button class="mode-btn" data-mode="cool">Cool tint</button>
        <button class="mode-btn" data-mode="warm">Warm tint</button>
        <button class="mode-btn" data-mode="invert">Invert</button>
        <button class="mode-btn" data-mode="none">Original</button>
      </div>
    </div>

    <div class="controls-card">
      <p class="card-title">Adjustments</p>
      <div class="slider-row">
        <label>Brightness</label>
        <input type="range" id="brightness" min="-100" max="100" value="0" oninput="onSlider()" />
        <span class="slider-val" id="brightnessVal">0</span>
      </div>
      <div class="slider-row">
        <label>Contrast</label>
        <input type="range" id="contrast" min="-100" max="100" value="0" oninput="onSlider()" />
        <span class="slider-val" id="contrastVal">0</span>
      </div>
      <div class="slider-row">
        <label>Effect strength</label>
        <input type="range" id="strength" min="0" max="100" value="100" oninput="onSlider()" />
        <span class="slider-val" id="strengthVal">100%</span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" onclick="downloadOutput()">⬇ Download PNG</button>
      <button class="btn btn-secondary" onclick="resetAll()">↩ New image</button>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<canvas id="canvas" style="display:none"></canvas>
<script>
  let srcImg = new Image();
  let mode = 'grayscale';
  let fileName = 'output';
  let debounceTimer;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) loadFile(f); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  document.getElementById('modeGrid').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    process();
  });

  function loadFile(file) {
    fileName = file.name.replace(/\.[^.]+$/, '');
    const url = URL.createObjectURL(file);
    srcImg.onload = () => {
      document.getElementById('origImg').src = url;
      dropzone.style.display = 'none';
      document.getElementById('panel').classList.add('visible');
      process();
    };
    srcImg.src = url;
  }

  function onSlider() {
    document.getElementById('brightnessVal').textContent = document.getElementById('brightness').value;
    document.getElementById('contrastVal').textContent   = document.getElementById('contrast').value;
    document.getElementById('strengthVal').textContent   = document.getElementById('strength').value + '%';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(process, 80);
  }

  function process() {
    const canvas = document.getElementById('canvas');
    canvas.width  = srcImg.naturalWidth;
    canvas.height = srcImg.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(srcImg, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imageData.data;
    const strength = parseInt(document.getElementById('strength').value) / 100;
    const brightness = parseInt(document.getElementById('brightness').value);
    const contrast   = parseInt(document.getElementById('contrast').value) / 100;

    for (let i = 0; i < d.length; i += 4) {
      let r = d[i], g = d[i+1], b = d[i+2];

      // Apply mode
      if (mode === 'grayscale') {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        r = r + (gray - r) * strength;
        g = g + (gray - g) * strength;
        b = b + (gray - b) * strength;
      } else if (mode === 'sepia') {
        const gray = 0.299*r + 0.587*g + 0.114*b;
        const sr = Math.min(255, gray * 1.2);
        const sg = Math.min(255, gray * 1.0);
        const sb = Math.min(255, gray * 0.75);
        r = r + (sr - r) * strength;
        g = g + (sg - g) * strength;
        b = b + (sb - b) * strength;
      } else if (mode === 'cool') {
        r = r + (r * 0.8 - r) * strength;
        b = b + (Math.min(255, b * 1.3) - b) * strength;
      } else if (mode === 'warm') {
        r = r + (Math.min(255, r * 1.3) - r) * strength;
        b = b + (b * 0.7 - b) * strength;
      } else if (mode === 'invert') {
        r = r + ((255 - r) - r) * strength;
        g = g + ((255 - g) - g) * strength;
        b = b + ((255 - b) - b) * strength;
      }

      // Brightness
      r = Math.min(255, Math.max(0, r + brightness));
      g = Math.min(255, Math.max(0, g + brightness));
      b = Math.min(255, Math.max(0, b + brightness));

      // Contrast: shift toward/away from 128
      if (contrast !== 0) {
        const f = contrast > 0 ? (1 + contrast * 2) : (1 / (1 + Math.abs(contrast) * 2));
        r = Math.min(255, Math.max(0, (r - 128) * f + 128));
        g = Math.min(255, Math.max(0, (g - 128) * f + 128));
        b = Math.min(255, Math.max(0, (b - 128) * f + 128));
      }

      d[i] = r; d[i+1] = g; d[i+2] = b;
    }

    ctx.putImageData(imageData, 0, 0);
    document.getElementById('outImg').src = canvas.toDataURL('image/png');
  }

  function downloadOutput() {
    const a = document.createElement('a');
    a.download = `${fileName}-${mode}.png`;
    a.href = document.getElementById('canvas').toDataURL('image/png');
    a.click();
  }

  function resetAll() {
    dropzone.style.display = '';
    document.getElementById('panel').classList.remove('visible');
    fileInput.value = '';
    ['brightness','contrast'].forEach(id => document.getElementById(id).value = 0);
    document.getElementById('strength').value = 100;
    document.getElementById('brightnessVal').textContent = '0';
    document.getElementById('contrastVal').textContent   = '0';
    document.getElementById('strengthVal').textContent   = '100%';
    mode = 'grayscale';
    document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', i === 0));
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
