<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Scrambler — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:3.5rem 4rem 5rem;max-width:720px;margin:0 auto;width:100%}
    .eyebrow{font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
    h1{font-family:'DM Serif Display',serif;font-size:2.8rem;letter-spacing:-.025em;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.6rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);resize:vertical;min-height:120px;outline:none;transition:border-color .2s;line-height:1.7}
    textarea:focus{border-color:var(--ink)}
    textarea::placeholder{color:var(--muted)}
    .mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;margin-bottom:1rem}
    .mode-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:left;line-height:1.4}
    .mode-btn small{display:block;font-weight:300;font-size:.72rem;opacity:.65;margin-top:.15rem}
    .mode-btn:hover{border-color:var(--ink);color:var(--ink)}
    .mode-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .options-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem}
    .option-check{display:flex;align-items:center;gap:.5rem;font-size:.88rem;cursor:pointer}
    .option-check input{width:16px;height:16px;accent-color:var(--ink);cursor:pointer}
    .output-wrap{position:relative}
    .output-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1rem 1rem 3rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);min-height:120px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .output-actions{position:absolute;bottom:.6rem;right:.75rem;display:flex;gap:.5rem}
    .out-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:.3rem .8rem;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .2s}
    .out-btn:hover{border-color:var(--ink);color:var(--ink)}
    .scramble-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:1rem;font-family:'DM Serif Display',serif;font-size:1.15rem;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
    .scramble-btn:hover{opacity:.8}
    .word-pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.75rem}
    .pill{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.3rem .75rem;font-size:.85rem;cursor:pointer;transition:all .2s;user-select:none}
    .pill:hover{border-color:var(--ink)}
    .pill.scrambled{background:var(--ink);color:#fff;border-color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}main{padding-top:2.5rem}h1{font-size:2rem}.mode-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <p class="eyebrow">🔀 Text</p>
  <h1>Word Scrambler</h1>
  <p class="subtitle">Scramble words, sentences, or paragraphs in a variety of ways. Great for puzzles, games, and testing.</p>

  <div class="card">
    <p class="card-title">Input text</p>
    <textarea id="input" placeholder="Type or paste your text here…"></textarea>
  </div>

  <div class="card">
    <p class="card-title">Scramble mode</p>
    <div class="mode-grid" id="modeGrid">
      <button class="mode-btn active" data-mode="letters">Scramble letters<small>inside each word</small></button>
      <button class="mode-btn" data-mode="words">Scramble words<small>shuffle word order</small></button>
      <button class="mode-btn" data-mode="sentences">Scramble sentences<small>shuffle sentence order</small></button>
      <button class="mode-btn" data-mode="keepfirst">Keep first & last<small>shuffle middle letters</small></button>
      <button class="mode-btn" data-mode="reverse">Reverse words<small>spell each word backward</small></button>
      <button class="mode-btn" data-mode="reverseorder">Reverse word order<small>last word becomes first</small></button>
    </div>
    <div class="options-row">
      <label class="option-check"><input type="checkbox" id="keepPunct" checked /> Keep punctuation in place</label>
      <label class="option-check"><input type="checkbox" id="keepCase" checked /> Preserve capitalisation</label>
    </div>
    <button class="scramble-btn" onclick="scramble()">🔀 Scramble</button>
  </div>

  <div class="card">
    <p class="card-title">Output</p>
    <div class="output-wrap">
      <div class="output-box" id="output">Your scrambled text will appear here.</div>
      <div class="output-actions">
        <button class="out-btn" onclick="copyOutput()">Copy</button>
        <button class="out-btn" onclick="scramble()">Re-scramble</button>
      </div>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  let activeMode = 'letters';

  document.getElementById('modeGrid').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeMode = btn.dataset.mode;
  });

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function scrambleWord(word) {
    const keepPunct = document.getElementById('keepPunct').checked;
    const keepCase  = document.getElementById('keepCase').checked;

    // Strip leading/trailing punctuation
    const match = word.match(/^([^a-zA-Z0-9]*)([a-zA-Z0-9].*[a-zA-Z0-9]|[a-zA-Z0-9])([^a-zA-Z0-9]*)$/);
    if (!match) return word;
    const [, pre, core, post] = match;

    if (core.length <= 2) return word;

    let letters = core.split('');
    const wasUpper = keepCase ? letters.map(c => c === c.toUpperCase() && c !== c.toLowerCase()) : [];
    const lower = letters.map(c => c.toLowerCase());
    const shuffled = shuffle(lower);

    let result;
    if (activeMode === 'keepfirst') {
      const mid = shuffle(lower.slice(1, -1));
      result = [lower[0], ...mid, lower[lower.length - 1]];
    } else if (activeMode === 'reverse') {
      result = [...lower].reverse();
    } else {
      result = shuffled;
    }

    if (keepCase) {
      result = result.map((c, i) => wasUpper[i] ? c.toUpperCase() : c);
    }

    return keepPunct ? pre + result.join('') + post : result.join('');
  }

  function scramble() {
    const text = document.getElementById('input').value;
    if (!text.trim()) {
      document.getElementById('output').textContent = 'Enter some text above first.';
      return;
    }

    let result;
    switch (activeMode) {
      case 'letters':
      case 'keepfirst':
      case 'reverse':
        result = text.replace(/\S+/g, w => scrambleWord(w));
        break;
      case 'words':
        result = text.split(/\n/).map(line => {
          const words = line.split(/\s+/);
          return shuffle(words).join(' ');
        }).join('\n');
        break;
      case 'sentences':
        result = shuffle(text.match(/[^.!?]+[.!?]+\s*/g) || [text]).join('').trim();
        break;
      case 'reverseorder':
        result = text.split(/\s+/).reverse().join(' ');
        break;
      default:
        result = text;
    }

    document.getElementById('output').textContent = result;
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    if (text === 'Your scrambled text will appear here.' || text === 'Enter some text above first.') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.out-btn');
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.textContent = 'Copy', 1400);
    });
  }
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
