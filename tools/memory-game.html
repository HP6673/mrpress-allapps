<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game — All Apps by MrPress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f6f2;--ink:#111;--muted:#888;--border:#e5e3dc;--card:#fff;--p1:#378add;--p2:#e24b4a;--bot:#1d9e75}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 4rem;border-bottom:1px solid var(--border)}
    .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .logo span{color:var(--muted)}
    .back-link{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--ink)}
    main{flex:1;padding:2rem 4rem 4rem;max-width:720px;margin:0 auto;width:100%}
    h1{font-family:'DM Serif Display',serif;font-size:2.2rem;letter-spacing:-.025em;margin-bottom:1rem;text-align:center}
    /* Setup */
    .setup-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.85rem}
    .opts-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
    .opt-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .opt-btn:hover{border-color:var(--ink);color:var(--ink)}
    .opt-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .start-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.9rem;font-family:'DM Serif Display',serif;font-size:1.05rem;cursor:pointer;transition:opacity .2s}
    .start-btn:hover{opacity:.8}
    /* HUD */
    .hud{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;margin-bottom:1rem;align-items:center}
    .player-hud{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:.75rem 1rem;text-align:center;transition:border-color .3s,background .3s}
    .player-hud.active{border-color:var(--p1);background:#f0f6ff}
    .player-hud.p2.active{border-color:var(--p2);background:#fff0f0}
    .player-hud.bot.active{border-color:var(--bot);background:#edf7f1}
    .ph-name{font-size:.78rem;font-weight:500;margin-bottom:.2rem}
    .ph-score{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-.02em}
    .turn-arrow{font-size:1.5rem;text-align:center}
    .status-msg{text-align:center;font-size:.88rem;color:var(--muted);margin-bottom:.75rem;min-height:1.3rem}
    /* Grid */
    .card-grid{display:grid;gap:8px;margin-bottom:1rem}
    .mem-card{aspect-ratio:1;background:var(--ink);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;transition:transform .15s;position:relative;user-select:none;-webkit-tap-highlight-color:transparent}
    .mem-card:hover{transform:scale(1.04)}
    .mem-card.flipped,.mem-card.matched{background:var(--card);border:2px solid var(--border)}
    .mem-card.matched{background:#edf7f1;border-color:#b2dfc6;cursor:default;transform:none}
    .mem-card .face{opacity:0;transition:opacity .1s}
    .mem-card.flipped .face,.mem-card.matched .face{opacity:1}
    .mem-card .back{position:absolute;color:rgba(255,255,255,.2);font-size:1.2rem}
    .mem-card.flipped .back,.mem-card.matched .back{opacity:0}
    /* Result */
    .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
    .result-box{background:var(--card);border-radius:14px;padding:2.5rem;text-align:center;max-width:340px;width:90%}
    .result-title{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:.5rem}
    .result-sub{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem}
    .result-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.85rem 2rem;font-family:'DM Serif Display',serif;font-size:1rem;cursor:pointer;width:100%}
    footer{border-top:1px solid var(--border);padding:1.5rem 4rem;font-size:.8rem;color:var(--muted)}
    @media(max-width:700px){header,main,footer{padding-left:1.5rem;padding-right:1.5rem}h1{font-size:1.8rem}.mem-card{font-size:1.4rem;border-radius:7px}}
  </style>
</head>
<body>
<header><a class="logo" href="../index.html">All Apps <span>by MrPress</span></a><a class="back-link" href="../index.html">← All tools</a></header>
<main>
  <h1>Memory Game 🧠</h1>

  <div class="setup-card" id="setupCard">
    <p class="card-title">Mode</p>
    <div class="opts-row" id="modeOpts">
      <button class="opt-btn active" data-m="bot">vs Bot</button>
      <button class="opt-btn" data-m="friend">vs Friend</button>
      <button class="opt-btn" data-m="solo">Solo</button>
    </div>
    <p class="card-title">Bot difficulty</p>
    <div class="opts-row" id="diffOpts">
      <button class="opt-btn" data-diff="easy">Easy (forgetful)</button>
      <button class="opt-btn active" data-diff="medium">Medium</button>
      <button class="opt-btn" data-diff="hard">Hard (perfect memory)</button>
    </div>
    <p class="card-title">Grid size</p>
    <div class="opts-row" id="sizeOpts">
      <button class="opt-btn" data-sz="8">4×2 (8 cards)</button>
      <button class="opt-btn active" data-sz="16">4×4 (16 cards)</button>
      <button class="opt-btn" data-sz="24">6×4 (24 cards)</button>
    </div>
    <button class="start-btn" onclick="startGame()">🧠 Start Game</button>
  </div>

  <div id="gameArea" style="display:none">
    <div class="hud" id="hud">
      <div class="player-hud active" id="p1Hud"><div class="ph-name" id="p1Name">You</div><div class="ph-score" id="p1Score">0</div></div>
      <div class="turn-arrow" id="turnArrow">▶</div>
      <div class="player-hud p2" id="p2Hud"><div class="ph-name" id="p2Name">Bot</div><div class="ph-score" id="p2Score">0</div></div>
    </div>
    <div class="status-msg" id="statusMsg">Your turn — pick a card</div>
    <div class="card-grid" id="cardGrid"></div>
    <button style="background:transparent;border:1px solid var(--border);border-radius:7px;padding:.55rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--muted);cursor:pointer;display:block;margin:0 auto;transition:all .2s" onclick="resetToSetup()">↩ New game</button>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-box">
      <div class="result-title" id="resultTitle">🎉</div>
      <div class="result-sub" id="resultSub"></div>
      <button class="result-btn" onclick="playAgain()">Play again</button>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script>
  const EMOJIS=['🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥝','🍍','🥭','🍌','🍉','🎯','🎲','🎸','🎺','🎻','🥁','🎪','🎭','🌟','🌈','🦋','🦄'];
  let mode='bot',botDiff='medium',gridSize=16;
  let cards=[],flipped=[],matched=new Set(),turn=0,scores=[0,0],locked=false;
  let botMemory={};

  document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.m;document.getElementById('diffOpts').style.display=mode==='bot'?'flex':'none';}));
  document.querySelectorAll('[data-diff]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-diff]').forEach(x=>x.classList.remove('active'));b.classList.add('active');botDiff=b.dataset.diff;}));
  document.querySelectorAll('[data-sz]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-sz]').forEach(x=>x.classList.remove('active'));b.classList.add('active');gridSize=parseInt(b.dataset.sz);}));

  function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

  function startGame(){
    document.getElementById('setupCard').style.display='none';
    document.getElementById('gameArea').style.display='block';
    scores=[0,0];turn=0;matched=new Set();locked=false;botMemory={};flipped=[];
    // Build cards
    const pairs=gridSize/2;
    const emojis=shuffle([...EMOJIS]).slice(0,pairs);
    cards=shuffle([...emojis,...emojis].map((e,i)=>({id:i,emoji:e,flipped:false,matched:false})));
    // Grid columns
    const cols=gridSize===8?4:gridSize===16?4:6;
    const grid=document.getElementById('cardGrid');
    grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    grid.innerHTML='';
    cards.forEach((c,i)=>{
      const div=document.createElement('div');div.className='mem-card';div.dataset.i=i;
      div.innerHTML=`<span class="back">❓</span><span class="face">${c.emoji}</span>`;
      div.addEventListener('click',()=>flip(i));
      grid.appendChild(div);
    });
    // HUD
    const isSolo=mode==='solo';
    document.getElementById('p1Name').textContent='You';
    document.getElementById('p2Name').textContent=mode==='bot'?'Bot':mode==='friend'?'Player 2':'-';
    document.getElementById('p1Score').textContent=0;document.getElementById('p2Score').textContent=0;
    document.getElementById('p2Hud').style.display=isSolo?'none':'block';
    document.getElementById('turnArrow').style.display=isSolo?'none':'block';
    updateHud();setStatus(isSolo?'Pick a card':'Your turn — pick a card');
  }

  function flip(i){
    if(locked||cards[i].matched||cards[i].flipped||flipped.length>=2)return;
    if(mode==='bot'&&turn===1)return;
    const el=document.querySelectorAll('.mem-card')[i];
    cards[i].flipped=true;el.classList.add('flipped');
    if(mode==='bot')botMemory[i]=cards[i].emoji;
    flipped.push(i);
    if(flipped.length===2)setTimeout(checkMatch,600);
  }

  function checkMatch(){
    const[a,b]=flipped;const ca=cards[a],cb=cards[b];
    const els=document.querySelectorAll('.mem-card');
    if(ca.emoji===cb.emoji){
      ca.matched=cb.matched=true;
      matched.add(a);matched.add(b);
      els[a].classList.add('matched');els[b].classList.add('matched');
      scores[turn]++;updateScores();
      flipped=[];
      if(matched.size===cards.length){endGame();return;}
      setStatus(turn===0?'Match! Go again':'Bot matched! Bot goes again');
      if(turn===1)setTimeout(botTurn,700);
    } else {
      cards[a].flipped=cards[b].flipped=false;
      setTimeout(()=>{els[a].classList.remove('flipped');els[b].classList.remove('flipped');},300);
      flipped=[];
      if(mode!=='solo'){turn=turn===0?1:0;updateHud();}
      if(mode==='bot'&&turn===1)setTimeout(botTurn,900);
      else setStatus(turn===0?'Your turn':'Player 2\'s turn');
    }
    locked=false;
  }

  function botTurn(){
    if(mode!=='bot'||turn!==1)return;
    locked=true;
    const avail=cards.map((c,i)=>({c,i})).filter(x=>!x.c.matched&&!x.c.flipped);
    // Bot tries to find a pair from memory
    const memKeys=Object.keys(botMemory).map(Number).filter(k=>!cards[k].matched);
    let pick1=-1,pick2=-1;
    // Look for a known pair
    for(const k of memKeys){
      const emoji=botMemory[k];
      const partner=memKeys.find(j=>j!==k&&botMemory[j]===emoji);
      if(partner!==undefined){pick1=k;pick2=partner;break;}
    }
    // Forget some cards based on difficulty
    const forgetChance=botDiff==='easy'?0.6:botDiff==='medium'?0.25:0;
    if(Math.random()<forgetChance&&memKeys.length>0){const rk=memKeys[Math.floor(Math.random()*memKeys.length)];delete botMemory[rk];}

    if(pick1===-1){
      const unknown=avail.filter(x=>botMemory[x.i]===undefined);
      const known=avail.filter(x=>botMemory[x.i]!==undefined);
      pick1=(unknown.length?unknown:avail)[Math.floor(Math.random()*(unknown.length||avail.length))].i;
      // After picking first, look for match
      const e1=cards[pick1].emoji;
      const matchIdx=known.find(x=>x.i!==pick1&&botMemory[x.i]===e1);
      pick2=matchIdx?matchIdx.i:(avail.filter(x=>x.i!==pick1))[Math.floor(Math.random()*(avail.length-1))].i;
    }

    const els=document.querySelectorAll('.mem-card');
    setStatus('Bot is thinking…');
    setTimeout(()=>{
      cards[pick1].flipped=true;els[pick1].classList.add('flipped');botMemory[pick1]=cards[pick1].emoji;flipped.push(pick1);
      setTimeout(()=>{
        cards[pick2].flipped=true;els[pick2].classList.add('flipped');botMemory[pick2]=cards[pick2].emoji;flipped.push(pick2);
        setTimeout(checkMatch,700);
      },700);
    },400);
  }

  function updateHud(){
    const isTurn0=turn===0;
    document.getElementById('p1Hud').classList.toggle('active',isTurn0);
    document.getElementById('p2Hud').classList.toggle('active',!isTurn0);
    document.getElementById('p2Hud').className='player-hud'+(mode==='bot'?' bot':'p2')+(isTurn0?'':' active');
    document.getElementById('turnArrow').textContent=isTurn0?'▶':'◀';
  }
  function updateScores(){document.getElementById('p1Score').textContent=scores[0];document.getElementById('p2Score').textContent=scores[1];}
  function setStatus(msg){document.getElementById('statusMsg').textContent=msg;}

  function endGame(){
    const overlay=document.getElementById('resultOverlay');
    overlay.style.display='flex';
    if(mode==='solo'){
      document.getElementById('resultTitle').textContent='🎉 Done!';
      document.getElementById('resultSub').textContent=`You matched all ${cards.length/2} pairs!`;
    } else {
      const winner=scores[0]>scores[1]?'You win!':(scores[1]>scores[0]?(mode==='bot'?'Bot wins!':'Player 2 wins!'):'It\'s a tie!');
      document.getElementById('resultTitle').textContent=winner;
      document.getElementById('resultSub').textContent=`${document.getElementById('p1Name').textContent}: ${scores[0]} | ${document.getElementById('p2Name').textContent}: ${scores[1]}`;
    }
  }

  function playAgain(){document.getElementById('resultOverlay').style.display='none';startGame();}
  function resetToSetup(){document.getElementById('gameArea').style.display='none';document.getElementById('setupCard').style.display='block';document.getElementById('resultOverlay').style.display='none';}
</script>
<script>try{var s=document.createElement('script');s.src='../ad.js';document.body.appendChild(s);}catch(e){}</script>
</body>
</html>
