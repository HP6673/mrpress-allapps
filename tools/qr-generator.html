<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator — All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f7f6f2; --ink:#111; --muted:#888; --border:#e5e3dc; --card:#fff; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:1.6rem 4rem; border-bottom:1px solid var(--border); }
    .logo { font-family:'DM Serif Display',serif; font-size:1.3rem; letter-spacing:-.02em; text-decoration:none; color:var(--ink); }
    .logo span { color:var(--muted); }
    .back-link { font-size:.85rem; color:var(--muted); text-decoration:none; transition:color .2s; }
    .back-link:hover { color:var(--ink); }
    main { flex:1; padding:3.5rem 4rem 5rem; max-width:760px; margin:0 auto; width:100%; }
    .eyebrow { font-size:.73rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
    h1 { font-family:'DM Serif Display',serif; font-size:2.8rem; letter-spacing:-.025em; margin-bottom:.5rem; }
    .subtitle { color:var(--muted); font-size:.95rem; margin-bottom:2rem; line-height:1.6; }
    .layout { display:grid; grid-template-columns:1fr 260px; gap:1.5rem; align-items:start; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.6rem; margin-bottom:1rem; }
    .card-title { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
    textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:.8rem 1rem; font-family:'DM Sans',sans-serif; font-size:.95rem; color:var(--ink); resize:vertical; min-height:110px; outline:none; transition:border-color .2s; line-height:1.6; }
    textarea:focus { border-color:var(--ink); }
    textarea::placeholder { color:var(--muted); }
    .options-row { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:1rem; }
    .opt-btn { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:.4rem .9rem; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; }
    .opt-btn:hover { border-color:var(--ink); color:var(--ink); }
    .opt-btn.active { background:var(--ink); border-color:var(--ink); color:#fff; }
    .qr-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.4rem; display:flex; flex-direction:column; align-items:center; gap:1rem; width:260px; flex-shrink:0; }
    #qrCanvas { border-radius:6px; display:block; width:100% !important; height:auto !important; max-width:220px; }
    .placeholder-box { width:220px; height:220px; border:1.5px dashed var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.85rem; text-align:center; padding:1rem; }
    .dl-btn { width:100%; background:var(--ink); color:#fff; border:none; border-radius:6px; padding:.65rem; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; cursor:pointer; transition:opacity .2s; }
    .dl-btn:hover { opacity:.75; }
    .dl-btn:disabled { opacity:.3; cursor:not-allowed; }
    .size-row { display:flex; align-items:center; gap:.75rem; }
    .size-row label { font-size:.82rem; color:var(--muted); }
    input[type="range"] { flex:1; accent-color:var(--ink); }
    .size-val { font-size:.82rem; font-weight:500; min-width:52px; }
    footer { border-top:1px solid var(--border); padding:1.5rem 4rem; font-size:.8rem; color:var(--muted); }
    @media(max-width:700px){ header,main,footer{padding-left:1.5rem;padding-right:1.5rem;} main{padding-top:2.5rem;} h1{font-size:2rem;} .layout{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<header>
  <a class="logo" href="../index.html">All Apps <span>by MrPress</span></a>
  <a class="back-link" href="../index.html">← All tools</a>
</header>
<main>
  <p class="eyebrow">📷 Utility</p>
  <h1>QR Code Generator</h1>
  <p class="subtitle">Turn any URL, text, or contact info into a scannable QR code. Download as PNG instantly.</p>

  <div class="layout">
    <div>
      <div class="card">
        <p class="card-title">Content</p>
        <div class="options-row" style="margin-top:0;margin-bottom:.75rem;">
          <button class="opt-btn active" data-prefix="" data-ph="https://example.com">URL</button>
          <button class="opt-btn" data-prefix="" data-ph="Enter any text…">Text</button>
          <button class="opt-btn" data-prefix="mailto:" data-ph="email@example.com">Email</button>
          <button class="opt-btn" data-prefix="tel:" data-ph="+1 555 000 0000">Phone</button>
        </div>
        <textarea id="content" placeholder="https://example.com" oninput="debounceGen()"></textarea>
      </div>
      <div class="card">
        <p class="card-title">Size</p>
        <div class="size-row">
          <label>Output size</label>
          <input type="range" id="sizeSlider" min="128" max="512" step="64" value="256" oninput="onSize(this.value)" />
          <span class="size-val" id="sizeVal">256 × 256</span>
        </div>
      </div>
    </div>

    <div class="qr-panel">
      <div id="qrWrap">
        <div class="placeholder-box" id="placeholder">Your QR code will appear here</div>
        <canvas id="qrCanvas" style="display:none"></canvas>
      </div>
      <button class="dl-btn" id="dlBtn" disabled onclick="downloadQR()">⬇ Download PNG</button>
    </div>
  </div>
</main>
<footer>All Apps by MrPress</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  let qrSize = 256, debounceTimer;
  let currentPrefix = '';

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPrefix = btn.dataset.prefix;
      document.getElementById('content').placeholder = btn.dataset.ph;
      generateQR();
    });
  });

  function onSize(v) {
    qrSize = parseInt(v);
    document.getElementById('sizeVal').textContent = v + ' × ' + v;
    generateQR();
  }

  function debounceGen() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generateQR, 350);
  }

  function generateQR() {
    const raw = document.getElementById('content').value.trim();
    const text = raw ? (currentPrefix + raw) : '';
    const canvas = document.getElementById('qrCanvas');
    const placeholder = document.getElementById('placeholder');

    if (!text) {
      canvas.style.display = 'none';
      placeholder.style.display = 'flex';
      document.getElementById('dlBtn').disabled = true;
      return;
    }

    try {
      const tempDiv = document.createElement('div');
      new QRCode(tempDiv, {
        text, width: qrSize, height: qrSize,
        colorDark: '#111111', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const img = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = qrSize;
        canvas.height = qrSize;
        if (img) {
          const i = new Image();
          i.onload = () => { ctx.drawImage(i, 0, 0, qrSize, qrSize); };
          i.src = img.src || (img.toDataURL ? img.toDataURL() : '');
          if (!img.src) { ctx.drawImage(img, 0, 0, qrSize, qrSize); }
        }
        canvas.style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('dlBtn').disabled = false;
      }, 100);
    } catch(e) {
      console.error(e);
    }
  }

  function downloadQR() {
    const canvas = document.getElementById('qrCanvas');
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
</script>
<script src="../ad.js"></script>
</body>
</html>
