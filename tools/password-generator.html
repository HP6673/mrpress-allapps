<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator — All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f7f6f2; --ink:#111; --muted:#888; --border:#e5e3dc; --card:#fff; --green:#1a7a4a; --green-bg:#edf7f1; --red:#b03030; --red-bg:#fdf0f0; --amber:#7a5a00; --amber-bg:#fffbee; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; align-items:center; justify-content:space-between; padding:1.6rem 4rem; border-bottom:1px solid var(--border); }
    .logo { font-family:'DM Serif Display',serif; font-size:1.3rem; letter-spacing:-.02em; text-decoration:none; color:var(--ink); }
    .logo span { color:var(--muted); }
    .back-link { font-size:.85rem; color:var(--muted); text-decoration:none; transition:color .2s; }
    .back-link:hover { color:var(--ink); }
    main { flex:1; padding:3.5rem 4rem 5rem; max-width:680px; margin:0 auto; width:100%; }
    .eyebrow { font-size:.73rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
    h1 { font-family:'DM Serif Display',serif; font-size:2.8rem; letter-spacing:-.025em; margin-bottom:.5rem; }
    .subtitle { color:var(--muted); font-size:.95rem; margin-bottom:2rem; line-height:1.6; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.6rem; margin-bottom:1rem; }
    .card-title { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }

    /* Password output */
    .pw-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:1.2rem 1rem; font-family:'DM Sans',monospace; font-size:1.1rem; letter-spacing:.06em; word-break:break-all; min-height:60px; display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
    .pw-text { flex:1; line-height:1.5; }
    .copy-btn { background:var(--ink); color:#fff; border:none; border-radius:6px; padding:.5rem 1rem; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .2s; flex-shrink:0; }
    .copy-btn:hover { opacity:.75; }

    /* Strength bar */
    .strength-wrap { margin-bottom:1rem; }
    .strength-label { display:flex; justify-content:space-between; font-size:.8rem; color:var(--muted); margin-bottom:.4rem; }
    .strength-bar { height:5px; border-radius:99px; background:var(--border); overflow:hidden; }
    .strength-fill { height:100%; border-radius:99px; transition:width .3s, background .3s; }

    /* Length slider */
    .length-row { display:flex; align-items:center; gap:1rem; margin-bottom:1.2rem; }
    .length-row label { font-size:.85rem; color:var(--muted); white-space:nowrap; }
    input[type="range"] { flex:1; accent-color:var(--ink); }
    .length-val { font-weight:500; min-width:30px; text-align:right; }

    /* Toggles */
    .toggle-list { display:flex; flex-direction:column; gap:.6rem; }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; }
    .toggle-row label { font-size:.9rem; }
    .toggle { position:relative; width:40px; height:22px; }
    .toggle input { opacity:0; width:0; height:0; position:absolute; }
    .toggle-track { position:absolute; inset:0; background:var(--border); border-radius:99px; cursor:pointer; transition:background .2s; }
    .toggle input:checked + .toggle-track { background:var(--ink); }
    .toggle-thumb { position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:3px; left:3px; transition:transform .2s; pointer-events:none; }
    .toggle input:checked ~ .toggle-thumb { transform:translateX(18px); }

    /* Regen button */
    .regen-btn { width:100%; background:transparent; border:1.5px solid var(--border); border-radius:8px; padding:.8rem; font-family:'DM Serif Display',serif; font-size:1.1rem; cursor:pointer; color:var(--ink); transition:all .2s; }
    .regen-btn:hover { border-color:var(--ink); background:var(--ink); color:#fff; }

    footer { border-top:1px solid var(--border); padding:1.5rem 4rem; font-size:.8rem; color:var(--muted); }
    @media(max-width:700px){ header,main,footer{padding-left:1.5rem;padding-right:1.5rem;} main{padding-top:2.5rem;} h1{font-size:2rem;} }
  </style>
</head>
<body>
<header>
  <a class="logo" href="../index.html">All Apps <span>by MrPress</span></a>
  <a class="back-link" href="../index.html">← All tools</a>
</header>
<main>
  <p class="eyebrow">🔒 Security</p>
  <h1>Password Generator</h1>
  <p class="subtitle">Generate a strong, random password instantly. Choose your length and character options.</p>

  <div class="card">
    <p class="card-title">Your password</p>
    <div class="pw-box">
      <span class="pw-text" id="pwText">—</span>
      <button class="copy-btn" id="copyBtn" onclick="copyPw()">Copy</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-label"><span>Strength</span><span id="strengthLabel">—</span></div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Options</p>
    <div class="length-row">
      <label>Length</label>
      <input type="range" id="lengthSlider" min="6" max="64" value="16" oninput="onLength(this.value)" />
      <span class="length-val" id="lengthVal">16</span>
    </div>
    <div class="toggle-list">
      <div class="toggle-row">
        <label>Uppercase (A–Z)</label>
        <label class="toggle"><input type="checkbox" id="upper" checked onchange="generate()"><span class="toggle-track"></span><span class="toggle-thumb"></span></label>
      </div>
      <div class="toggle-row">
        <label>Lowercase (a–z)</label>
        <label class="toggle"><input type="checkbox" id="lower" checked onchange="generate()"><span class="toggle-track"></span><span class="toggle-thumb"></span></label>
      </div>
      <div class="toggle-row">
        <label>Numbers (0–9)</label>
        <label class="toggle"><input type="checkbox" id="numbers" checked onchange="generate()"><span class="toggle-track"></span><span class="toggle-thumb"></span></label>
      </div>
      <div class="toggle-row">
        <label>Symbols (!@#$...)</label>
        <label class="toggle"><input type="checkbox" id="symbols" onchange="generate()"><span class="toggle-track"></span><span class="toggle-thumb"></span></label>
      </div>
    </div>
  </div>

  <button class="regen-btn" onclick="generate()">↻ Generate new password</button>
</main>
<footer>All Apps by MrPress</footer>
<script>
  function onLength(v) {
    document.getElementById('lengthVal').textContent = v;
    generate();
  }
  function generate() {
    const upper   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower   = 'abcdefghijklmnopqrstuvwxyz';
    const nums    = '0123456789';
    const syms    = '!@#$%^&*()-_=+[]{}|;:,.<>?';
    let charset = '';
    if (document.getElementById('upper').checked)   charset += upper;
    if (document.getElementById('lower').checked)   charset += lower;
    if (document.getElementById('numbers').checked) charset += nums;
    if (document.getElementById('symbols').checked) charset += syms;
    if (!charset) charset = lower;
    const len = parseInt(document.getElementById('lengthSlider').value);
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    const pw = Array.from(arr).map(n => charset[n % charset.length]).join('');
    document.getElementById('pwText').textContent = pw;
    document.getElementById('copyBtn').textContent = 'Copy';
    updateStrength(pw);
  }
  function updateStrength(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (pw.length >= 16) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const pct  = Math.min(100, Math.round(score / 7 * 100));
    const fill = document.getElementById('strengthFill');
    const lbl  = document.getElementById('strengthLabel');
    fill.style.width = pct + '%';
    if (pct < 40)      { fill.style.background='#e24b4a'; lbl.textContent='Weak'; }
    else if (pct < 70) { fill.style.background='#f59e0b'; lbl.textContent='Fair'; }
    else if (pct < 90) { fill.style.background='#1d9e75'; lbl.textContent='Strong'; }
    else               { fill.style.background='#0f6e56'; lbl.textContent='Very strong'; }
  }
  function copyPw() {
    const pw = document.getElementById('pwText').textContent;
    if (pw === '—') return;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }
  generate();
</script>
<script src="../ad.js"></script>
</body>
</html>
