<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --ink: #111;
      --muted: #888;
      --accent: #1a1a1a;
      --card-bg: #ffffff;
      --border: #e5e3dc;
      --tag-bg: #efefeb;
      --hover-lift: translateY(-3px);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 4rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
    }

    .logo span { color: var(--muted); font-weight: 300; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    #search {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.5rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--ink);
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--ink); }

    /* ── Hero ── */
    .hero {
      padding: 5rem 4rem 3rem;
      max-width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
    }

    .hero p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Filter tabs ── */
    .filter-bar {
      padding: 0 4rem;
      margin-bottom: 2.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── Tool count ── */
    .section-label {
      padding: 0 4rem;
      margin-bottom: 1.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      margin: 0 4rem 6rem;
    }

    .tool-card {
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .tool-card::after {
      content: '→';
      position: absolute;
      bottom: 1.8rem;
      right: 2rem;
      font-size: 1rem;
      color: var(--border);
      transition: all 0.2s;
    }

    .tool-card:hover {
      background: var(--ink);
      color: #fff;
    }

    .tool-card:hover::after { color: #fff; right: 1.5rem; }
    .tool-card:hover .tool-tag { background: rgba(255,255,255,0.15); color: #fff; }
    .tool-card:hover .tool-desc { color: rgba(255,255,255,0.65); }

    .tool-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .tool-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
    }

    .tool-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .tool-tag {
      display: inline-block;
      background: var(--tag-bg);
      border-radius: 99px;
      padding: 0.25rem 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      align-self: flex-start;
      transition: all 0.2s;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      header, .hero, .filter-bar, .section-label, .grid, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      .hero { padding-top: 3rem; }
      .hero h1 { font-size: 2.5rem; }
      .grid { margin-left: 1.5rem; margin-right: 1.5rem; }
      #search { width: 160px; }
    }

    /* ── Fade-in ── */
    .tool-card {
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">All Apps <span>by MrPress</span></a>
    <div class="header-right">
      <input id="search" type="text" placeholder="Search tools…" />
    </div>
  </header>

  <section class="hero">
    <p class="hero-eyebrow">One stop shop</p>
    <h1>Every tool you need.</h1>
    <p>A growing collection of free, fast, browser-based tools — no installs, no accounts, no nonsense.</p>
  </section>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">All</button>
    <!-- Categories are injected automatically from tools.js -->
  </div>

  <p class="section-label" id="toolCount"></p>

  <div class="grid" id="toolGrid"></div>

  <footer>
    <span>All Apps by MrPress</span>
    <span id="footerCount"></span>
  </footer>

  <!-- Load the tool registry — edit tools.js to add tools -->
  <script src="tools.js"></script>

  <!-- Ad popup — edit ad.js to change the image/link -->
  <script src="ad.js"></script>

  <script>
    // ── Build category filter buttons ──
    const cats = ['all', ...new Set((window.TOOLS || []).map(t => t.category))];
    const filterBar = document.getElementById('filterBar');
    filterBar.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat === 'all' ? 'All' : cat;
      filterBar.appendChild(btn);
    });

    // ── Render grid ──
    let activeCat = 'all';
    let searchQuery = '';

    function renderGrid() {
      const grid = document.getElementById('toolGrid');
      const count = document.getElementById('toolCount');
      const footer = document.getElementById('footerCount');

      const filtered = (window.TOOLS || []).filter(t => {
        const matchCat = activeCat === 'all' || t.category === activeCat;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || t.name.toLowerCase().includes(q) || t.description.toLowerCase().includes(q) || t.category.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      count.textContent = filtered.length + ' tool' + (filtered.length !== 1 ? 's' : '');
      footer.textContent = (window.TOOLS || []).length + ' tools total';

      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No tools found. Try a different search.</div>';
        return;
      }

      filtered.forEach((tool, i) => {
        const a = document.createElement('a');
        a.className = 'tool-card';
        a.href = tool.url;
        a.style.animationDelay = (i * 0.04) + 's';
        a.innerHTML = `
          <div class="tool-icon">${tool.icon}</div>
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.description}</div>
          <span class="tool-tag">${tool.category}</span>
        `;
        grid.appendChild(a);
      });
    }

    // ── Filter buttons ──
    filterBar.addEventListener('click', e => {
      if (!e.target.matches('.filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeCat = e.target.dataset.cat;
      renderGrid();
    });

    // ── Search ──
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderGrid();
    });

    renderGrid();
  </script>
</body>
</html>
