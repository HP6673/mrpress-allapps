<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Apps by MrPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f7f6f2; --ink:#111; --muted:#888; --card-bg:#ffffff; --border:#e5e3dc; --tag-bg:#efefeb; }
    body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; }
    header { display:flex; align-items:center; justify-content:space-between; padding:2rem 4rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
    .logo { font-family:'DM Serif Display',serif; font-size:1.4rem; letter-spacing:-.02em; text-decoration:none; color:var(--ink); }
    .logo span { color:var(--muted); font-weight:300; }
    #search { background:transparent; border:1px solid var(--border); border-radius:99px; padding:.5rem 1.2rem; font-family:'DM Sans',sans-serif; font-size:.85rem; color:var(--ink); width:220px; outline:none; transition:border-color .2s; }
    #search::placeholder { color:var(--muted); }
    #search:focus { border-color:var(--ink); }
    .hero { padding:5rem 4rem 3rem; max-width:100%; text-align:center; display:flex; flex-direction:column; align-items:center; }
    .hero-eyebrow { font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
    .hero h1 { font-family:'DM Serif Display',serif; font-size:clamp(2.8rem,5vw,4.5rem); line-height:1.05; letter-spacing:-.03em; margin-bottom:1.2rem; }
    .hero p { font-size:1.05rem; color:var(--muted); line-height:1.7; }
    .filter-bar { padding:0 4rem; margin-bottom:2.5rem; display:flex; gap:.5rem; flex-wrap:wrap; }
    .filter-btn { background:transparent; border:1px solid var(--border); border-radius:99px; padding:.4rem 1rem; font-family:'DM Sans',sans-serif; font-size:.82rem; color:var(--muted); cursor:pointer; transition:all .2s; }
    .filter-btn:hover, .filter-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }
    .section-label { padding:0 4rem; margin-bottom:1.5rem; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1px; border-top:1px solid var(--border); border-left:1px solid var(--border); margin:0 4rem 2rem; }
    .tool-card { background:var(--card-bg); border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:2rem; text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:.8rem; transition:background .2s; position:relative; overflow:hidden; animation:fadeUp .4s ease both; }
    .tool-card::after { content:'→'; position:absolute; bottom:1.8rem; right:2rem; font-size:1rem; color:var(--border); transition:all .2s; }
    .tool-card:hover { background:var(--ink); color:#fff; }
    .tool-card:hover::after { color:#fff; right:1.5rem; }
    .tool-card:hover .tool-tag { background:rgba(255,255,255,.15); color:#fff; }
    .tool-card:hover .tool-desc { color:rgba(255,255,255,.65); }
    .tool-icon { font-size:1.6rem; line-height:1; }
    .tool-name { font-family:'DM Serif Display',serif; font-size:1.25rem; letter-spacing:-.01em; }
    .tool-desc { font-size:.88rem; color:var(--muted); line-height:1.6; flex:1; }
    .tool-tag { display:inline-block; background:var(--tag-bg); border-radius:99px; padding:.25rem .75rem; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); align-self:flex-start; transition:all .2s; }
    .empty { grid-column:1/-1; padding:4rem 2rem; text-align:center; color:var(--muted); font-size:.95rem; }
    footer { border-top:1px solid var(--border); padding:2rem 4rem; display:flex; justify-content:space-between; align-items:center; font-size:.8rem; color:var(--muted); flex-wrap:wrap; gap:.5rem; }
    .footer-copy { font-size:.78rem; color:var(--muted); }
    @media(max-width:700px) { header,.hero,.filter-bar,.section-label,.grid,footer{padding-left:1.5rem;padding-right:1.5rem} .hero{padding-top:3rem} .hero h1{font-size:2.5rem} .grid{margin-left:1.5rem;margin-right:1.5rem} #search{width:160px} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">All Apps <span>by MrPress</span></a>
    <input id="search" type="text" placeholder="Search tools…" />
  </header>

  <section class="hero">
    <p class="hero-eyebrow">One stop shop</p>
    <h1>Every tool you need.</h1>
    <p>A growing collection of free, fast, browser-based tools — no installs, no accounts, no nonsense.</p>
  </section>

  <div class="filter-bar" id="filterBar"></div>
  <p class="section-label" id="toolCount"></p>
  <div class="grid" id="toolGrid"></div>

  <footer>
    <span>All Apps by MrPress</span>
    <span id="footerCount"></span>
    <span class="footer-copy">© <span id="year"></span> MrPress LLC. All rights reserved.</span>
  </footer>

  <script>
  // ============================================================
  //  TOOL LIST — Add a tool by pasting a block here.
  //  Then upload the tool's HTML file to the /tools/ folder.
  //  That's it — no other files need to change.
  //
  //  Copy this block to add a tool:
  //  ─────────────────────────────────────────────────────────
  //  {
  //    name:        "",
  //    description: "",
  //    icon:        "",
  //    category:    "",
  //    url:         "tools/.html"
  //  },
  // ============================================================

  const TOOLS = [

    // ── Text ─────────────────────────────────────────────────
    {
      name:        "Word Counter",
      description: "Count words, characters, sentences and reading time instantly.",
      icon:        "📝",
      category:    "Text",
      url:         "tools/word-counter.html"
    },

    // ── Image ────────────────────────────────────────────────
    {
      name:        "Image Converter",
      description: "Convert any image between JPG, PNG, GIF, BMP, TIFF, and WebP — right in your browser.",
      icon:        "🖼️",
      category:    "Image",
      url:         "tools/image-converter.html"
    },
    {
      name:        "Image Rotator",
      description: "Rotate or flip any image by any angle. Download instantly.",
      icon:        "🔄",
      category:    "Image",
      url:         "tools/image-rotator.html"
    },
    {
      name:        "Image Quality",
      description: "Compress images and adjust quality. Live before/after comparison with file size savings.",
      icon:        "🗜️",
      category:    "Image",
      url:         "tools/image-quality.html"
    },
    {
      name:        "Image Grayscaler",
      description: "Convert images to grayscale, sepia, cool/warm tint, or invert. Adjust brightness and contrast.",
      icon:        "⬛",
      category:    "Image",
      url:         "tools/image-grayscaler.html"
    },

    // ── Calculator ───────────────────────────────────────────
    {
      name:        "Tip Calculator",
      description: "Calculate tip and split the bill between any number of people.",
      icon:        "🧾",
      category:    "Calculator",
      url:         "tools/tip-calculator.html"
    },
    {
      name:        "BMI Calculator",
      description: "Calculate your Body Mass Index in metric or imperial with a visual scale.",
      icon:        "⚖️",
      category:    "Calculator",
      url:         "tools/bmi-calculator.html"
    },

    // ── Finance ──────────────────────────────────────────────
    {
      name:        "Currency Converter",
      description: "Live exchange rates for 160+ currencies with popular pair shortcuts.",
      icon:        "💱",
      category:    "Finance",
      url:         "tools/currency-converter.html"
    },
    {
      name:        "Loan Calculator",
      description: "Calculate monthly payments, total interest, and a full amortization schedule.",
      icon:        "🏦",
      category:    "Finance",
      url:         "tools/loan-calculator.html"
    },

    // ── Design ───────────────────────────────────────────────
    {
      name:        "Color Picker",
      description: "Pick any color and get HEX, RGB, and HSL values instantly. Includes shades and tints.",
      icon:        "🎨",
      category:    "Design",
      url:         "tools/color-picker.html"
    },

    // ── Business ─────────────────────────────────────────────
    {
      name:        "Invoice Generator",
      description: "Create a professional invoice or receipt in seconds. Print or save as PDF.",
      icon:        "📄",
      category:    "Business",
      url:         "tools/invoice-generator.html"
    },

    // ── Security ─────────────────────────────────────────────
    {
      name:        "Password Generator",
      description: "Generate strong, random passwords with custom length and character options.",
      icon:        "🔒",
      category:    "Security",
      url:         "tools/password-generator.html"
    },

    // ── Utility ──────────────────────────────────────────────
    {
      name:        "QR Code Generator",
      description: "Turn any URL, text, email, or phone number into a downloadable QR code.",
      icon:        "📷",
      category:    "Utility",
      url:         "tools/qr-generator.html"
    },
    {
      name:        "Unit Converter",
      description: "Convert between length, weight, temperature, and volume units instantly.",
      icon:        "📐",
      category:    "Utility",
      url:         "tools/unit-converter.html"
    },
    {
      name:        "Timer",
      description: "Countdown timer and stopwatch with lap tracking, presets, and looping alarm.",
      icon:        "⏱️",
      category:    "Utility",
      url:         "tools/timer.html"
    },

    // ── ADD MORE TOOLS BELOW ──────────────────────────────────
    {
      name:        "Image Border",
      description: "Add a custom border around any image — choose size, colour, and corner radius.",
      icon:        "🖼️",
      category:    "Image",
      url:         "tools/image-border.html"
    },
    {
      name:        "GIF Speed Changer",
      description: "Speed up or slow down any GIF. Preview and download instantly.",
      icon:        "⚡",
      category:    "GIF",
      url:         "tools/gif-speed.html"
    },
    {
      name:        "GIF to ZIP",
      description: "Extract every frame from a GIF as PNG or JPG images, bundled into a ZIP file.",
      icon:        "📦",
      category:    "GIF",
      url:         "tools/gif-to-zip.html"
    },
    {
      name:        "Word Scrambler",
      description: "Scramble letters, words, or sentences in multiple modes. Great for puzzles and games.",
      icon:        "🔀",
      category:    "Text",
      url:         "tools/word-scrambler.html"
    },
    {
      name:        "Paraphraser",
      description: "Rewrite any text in a different tone — Standard, Formal, Casual, Concise, Creative and more. Powered by AI.",
      icon:        "✍️",
      category:    "Text",
      url:         "tools/paraphraser.html"
    },
    {
      name:        "Number Sorter",
      description: "Paste a list of numbers and sort ascending or descending. Removes duplicates, shows sum, min, and max.",
      icon:        "🔢",
      category:    "Utility",
      url:         "tools/number-sorter.html"
    },
    {
      name:        "Digital Clock",
      description: "A clean, minimal digital clock. Hit fullscreen to hide everything and use it as a desk clock.",
      icon:        "🕐",
      category:    "Utility",
      url:         "tools/digital-clock.html"
    },
    {
      name:        "Image Cropper",
      description: "Drag to crop any image. Lock to an aspect ratio or enter exact pixel coordinates.",
      icon:        "✂️",
      category:    "Image",
      url:         "tools/image-cropper.html"
    },
    {
      name:        "Slides to PDF",
      description: "Convert slide screenshots or images into a PDF, or extract PDF pages as images in a ZIP.",
      icon:        "📑",
      category:    "Document",
      url:         "tools/slides-to-pdf.html"
    },

    // ── ADD MORE TOOLS BELOW ──────────────────────────────────

  ];

  // ── Sort tools alphabetically ──
  TOOLS.sort((a, b) => a.name.localeCompare(b.name));

  // ── Set copyright year ──
  document.getElementById('year').textContent = new Date().getFullYear();

  // ── Build category filters ──
  const cats = ['all', ...new Set(TOOLS.map(t => t.category)).keys()].sort((a,b) => a === 'all' ? -1 : b === 'all' ? 1 : a.localeCompare(b));
  const filterBar = document.getElementById('filterBar');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat === 'all' ? 'All' : cat;
    filterBar.appendChild(btn);
  });

  // ── Render grid ──
  let activeCat = 'all';
  let searchQuery = '';

  function renderGrid() {
    const grid  = document.getElementById('toolGrid');
    const count = document.getElementById('toolCount');
    const foot  = document.getElementById('footerCount');

    const filtered = TOOLS.filter(t => {
      const matchCat    = activeCat === 'all' || t.category === activeCat;
      const q           = searchQuery.toLowerCase();
      const matchSearch = !q || t.name.toLowerCase().includes(q) || t.description.toLowerCase().includes(q) || t.category.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    count.textContent = filtered.length + ' tool' + (filtered.length !== 1 ? 's' : '');
    foot.textContent  = TOOLS.length + ' tools total';
    grid.innerHTML    = '';

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">No tools found. Try a different search.</div>';
      return;
    }

    filtered.forEach((tool, i) => {
      const a = document.createElement('a');
      a.className = 'tool-card';
      a.href = tool.url;
      a.style.animationDelay = (i * 0.04) + 's';
      a.innerHTML = `
        <div class="tool-icon">${tool.icon}</div>
        <div class="tool-name">${tool.name}</div>
        <div class="tool-desc">${tool.description}</div>
        <span class="tool-tag">${tool.category}</span>
      `;
      grid.appendChild(a);
    });
  }

  filterBar.addEventListener('click', e => {
    if (!e.target.matches('.filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeCat = e.target.dataset.cat;
    renderGrid();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderGrid();
  });

  renderGrid();
  </script>

  <!-- Ad popup — safe wrapper so errors here never break the page -->
  <script>
    try { var s = document.createElement('script'); s.src = 'ad.js'; document.body.appendChild(s); } catch(e) {}
  </script>

</body>
</html>
